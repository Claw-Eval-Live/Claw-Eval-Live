task_id: CTB_MGMT_03_team_capacity_planning
task_name: Team Capacity Planning
version: "1.0"
category: management
difficulty: medium

services:
  - name: calendar
    command: python mock_services/calendar/server.py
    port: 9101
    health_check: http://localhost:9101/calendar/events
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9101/calendar/reset
    env:
      CALENDAR_FIXTURES: tasks/CTB_MGMT_03_team_capacity_planning/fixtures/calendar/events.json
      ERROR_RATE: "0"

  - name: todo
    command: python mock_services/todo/server.py
    port: 9104
    health_check: http://localhost:9104/todo/tasks
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9104/todo/reset
    env:
      TODO_FIXTURES: tasks/CTB_MGMT_03_team_capacity_planning/fixtures/todo/tasks.json
      ERROR_RATE: "0"

prompt:
  text: |
    You are the Engineering Department manager and need to analyze the team's capacity for next week (March 30 - April 3). Team members: zhang.lei (you/manager), wang.fang, li.na, chen.wei, zhao.peng. Please:

    1. Check the calendar for next week's meeting schedule and calculate each person's meeting time
    2. Check the task management system for each member's current tasks and deadlines
    3. Analyze each member's workload:
       - Meeting time commitment
       - Number and priority of in-progress and pending tasks
       - Whether there are deadline conflicts
    4. Generate a capacity planning report:
       - Each person's meeting time percentage and task load
       - Overloaded team members (bottlenecks)
       - Task rebalancing recommendations
       - Risk alerts (e.g., tasks with tight deadlines)
  language: en

tools:
  - name: calendar_list_events
    description: Get the list of calendar events
    input_schema:
      type: object
      properties:
        days_ahead:
          type: integer
          default: 7
        max_results:
          type: integer
          default: 20
      required: []

  - name: todo_list_tasks
    description: Get the list of tasks
    input_schema:
      type: object
      properties:
        max_results:
          type: integer
          default: 20
      required: []

  - name: todo_get_task
    description: Get task details by task ID
    input_schema:
      type: object
      properties:
        task_id:
          type: string
      required: [task_id]

tool_endpoints:
  - tool_name: calendar_list_events
    url: http://localhost:9101/calendar/events
    method: POST
  - tool_name: todo_list_tasks
    url: http://localhost:9104/todo/tasks
    method: POST
  - tool_name: todo_get_task
    url: http://localhost:9104/todo/tasks/get
    method: POST

environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
    - fixtures/calendar/events.json
    - fixtures/todo/tasks.json

scoring_components: []
expected_actions: []
reference_solution: |
  1. Team members: zhang.lei, wang.fang, li.na, chen.wei, zhao.peng
  2. wang.fang is the bottleneck (most meetings ~7h and most tasks)
  3. Microservice refactoring deadline April 1 is at risk of being missed
  4. Meeting time percentages calculated per person
  5. Task load analysis considers priority levels
  6. Rebalancing plan: offload tasks from wang.fang to less loaded members
  7. Specific task transfer recommendations (who to whom)
  8. Deadline conflict mitigation strategy for microservice task
primary_dimensions: [completion]
