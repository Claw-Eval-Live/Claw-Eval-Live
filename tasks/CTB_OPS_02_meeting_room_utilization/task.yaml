task_id: CTB_OPS_02_meeting_room_utilization
task_name: Meeting Room Utilization Analysis
version: "1.0"
category: workflow
difficulty: medium

services:
  - name: calendar
    command: python mock_services/calendar/server.py
    port: 9101
    health_check: http://localhost:9101/calendar/events
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9101/calendar/reset
    env:
      CALENDAR_FIXTURES: tasks/CTB_OPS_02_meeting_room_utilization/fixtures/calendar/events.json
      ERROR_RATE: "0"

prompt:
  text: |
    Please analyze this week's (March 23-27, 2026) meeting room utilization.

    Requirements:
    1. Retrieve all meeting room booking records for this week
    2. Per meeting room, calculate:
       - Number of bookings
       - Total hours used
       - Assuming each room is available 8 hours per day (9:00-17:00), calculate each room's utilization rate for the week (5 business days)
    3. Analyze meeting room usage efficiency:
       - Ratio of attendees to room capacity (seat utilization), and flag wasteful use of large rooms for small meetings
       - List meetings where seat utilization is below 50%
    4. Provide optimization recommendations

    Please produce a complete meeting room utilization analysis report.
  language: en

tools:
  - name: calendar_list_events
    description: List calendar events
    input_schema:
      type: object
      properties:
        start_date:
          type: string
          description: Start date
        end_date:
          type: string
          description: End date
      required: []

  - name: calendar_get_event
    description: Get event details
    input_schema:
      type: object
      properties:
        event_id:
          type: string
          description: Event ID
      required: [event_id]

tool_endpoints:
  - tool_name: calendar_list_events
    url: http://localhost:9101/calendar/events
    method: POST
  - tool_name: calendar_get_event
    url: http://localhost:9101/calendar/events/get
    method: POST

environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
    - fixtures/calendar/events.json

scoring_components: []
safety_checks: []
reference_solution: |
  1. Room A: 4 bookings, ~4.75 hours, utilization ~11.9% (of 40h weekly)
  2. Room B: 2 bookings, ~2.5 hours, utilization ~6.25%
  3. Room C: 2 bookings, ~2.5 hours, utilization ~6.25%
  4. Low seat utilization meetings: Frontend Tech Talk, 1-on-1 Performance review, Bug Fix session
  5. These meetings use large rooms for small groups (below 50% seat utilization)
  6. Recommendation: use smaller rooms for small meetings
  7. Consider combining underutilized time slots
  8. Suggest room assignment policies based on meeting size
primary_dimensions: [completion]
