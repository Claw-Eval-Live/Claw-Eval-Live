task_id: CTB_SHELL_21_queue_depth_monitor
task_name: Queue Depth Monitor
version: '1.0'
category: workflow
difficulty: medium-hard
services:
- name: helpdesk
  command: python mock_services/helpdesk/server.py
  port: 9107
  health_check: http://localhost:9107/helpdesk/tickets
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9107/helpdesk/reset
  env:
    HELPDESK_FIXTURES: tasks/CTB_SHELL_21_queue_depth_monitor/fixtures/helpdesk/tickets.json
    ERROR_RATE: '0'
- name: notes
  command: python mock_services/notes/server.py
  port: 9105
  health_check: http://localhost:9105/notes/list
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9105/notes/reset
  env:
    NOTES_FIXTURES: tasks/CTB_SHELL_21_queue_depth_monitor/fixtures/notes/documents.json
    ERROR_RATE: '0'
prompt:
  text: |
    The message queue monitoring system has triggered multiple backlog alerts. Please:
    
    1. Review all tickets to find alerts about message queue backlogs
    2. Review the message queue architecture documentation and consumer configuration notes
    3. Analyze the root cause of each queue's backlog and its impact on downstream services
    4. Generate a monitoring report including: queue name, current depth, processing rate, consumer count, backlog cause, and remediation recommendations

  language: en
tools:
- name: helpdesk_list_tickets
  description: List tickets
  input_schema:
    type: object
    properties:
      status:
        type: string
    required: []
- name: helpdesk_get_ticket
  description: Get ticket details
  input_schema:
    type: object
    properties:
      ticket_id:
        type: string
    required:
    - ticket_id
- name: notes_list_documents
  description: List documents
  input_schema:
    type: object
    properties: {}
    required: []
- name: notes_get_document
  description: Get document details
  input_schema:
    type: object
    properties:
      note_id:
        type: string
    required:
    - note_id
tool_endpoints:
- tool_name: helpdesk_list_tickets
  url: http://localhost:9107/helpdesk/tickets
  method: POST
- tool_name: helpdesk_get_ticket
  url: http://localhost:9107/helpdesk/tickets/get
  method: POST
- tool_name: notes_list_documents
  url: http://localhost:9105/notes/list
  method: POST
- tool_name: notes_get_document
  url: http://localhost:9105/notes/get
  method: POST
environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
  - fixtures/helpdesk/tickets.json
  - fixtures/notes/documents.json
scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  1. List tickets: TK-2101 (order queue backlog 50K), TK-2102 (notification queue consumer stopped), TK-2103 (analytics queue data accumulating)
  2. Review docs: note_2101 (MQ architecture docs) and note_2102 (consumer scaling strategy)
  3. Analysis:
     - TK-2101: order queue backlog due to database lock contention, consumer processing rate dropped from 1000/s to 50/s
     - TK-2102: notification consumer process crashed, not auto-restarted, 20K messages pending
     - TK-2103: analytics consumer deliberately paused for maintenance, backlog is expected
  4. Remediation: optimize DB queries for order consumer, restart notification consumer with supervisord, analytics consumer to resume after maintenance

primary_dimensions:
- completion
