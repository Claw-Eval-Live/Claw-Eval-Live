task_id: CTB_PRODAPP_17_blocker_resolution
task_name: CTB_PRODAPP_17_blocker_resolution
version: '1.0'
category: workflow
difficulty: medium
services:
- name: todo
  command: python mock_services/todo/server.py
  port: 9104
  health_check: http://localhost:9104/todo/tasks
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9104/todo/reset
  env:
    ERROR_RATE: '0'
    TODO_FIXTURES: tasks/CTB_PRODAPP_17_blocker_resolution/fixtures/todo/tasks.json
- name: notes
  command: python mock_services/notes/server.py
  port: 9105
  health_check: http://localhost:9105/notes/list
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9105/notes/reset
  env:
    ERROR_RATE: '0'
    NOTES_FIXTURES: tasks/CTB_PRODAPP_17_blocker_resolution/fixtures/notes/meetings.json
prompt:
  text: |
    Please identify and propose resolutions for all blockers. Based on blocked tasks in the to-do list and related context in notes, analyze root causes and propose solutions. Output: blocker list with root causes, proposed resolutions, escalation needs, and priority ranking.
  language: en
tools:
- name: todo_list_tasks
  description: Retrieve the to-do task list
  input_schema:
    type: object
    properties:
      status:
        type: string
        description: Filter by status
        default: all
    required: []
- name: todo_update_task
  description: Description
  input_schema:
    type: object
    properties:
      task_id:
        type: string
      status:
        type: string
      priority:
        type: string
    required:
    - task_id
- name: notes_list
  description: Priority level
  input_schema:
    type: object
    properties:
      max_results:
        type: integer
        description: Maximum number of results to return
        default: 10
    required: []
- name: notes_get
  description: Description
  input_schema:
    type: object
    properties:
      note_id:
        type: string
        description: Note ID
    required:
    - note_id
tool_endpoints:
- tool_name: todo_list_tasks
  url: http://localhost:9104/todo/tasks
  method: POST
- tool_name: todo_update_task
  url: http://localhost:9104/todo/tasks/update
  method: POST
- tool_name: notes_list
  url: http://localhost:9105/notes/list
  method: POST
- tool_name: notes_get
  url: http://localhost:9105/notes/get
  method: POST
environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
  - fixtures/todo/tasks.json
  - fixtures/notes/meetings.json
scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  1. Blocker 1 -- Payment Gateway: third-party gateway unavailable; workaround is to use Mock/sandbox service for testing; highest priority (core business + earliest deadline)
  2. Blocker 2 -- Data Export: DBA permission issue blocking access; workaround is to use test environment with small dataset, or escalate to director-level for expedited DBA permission
  3. Blocker 3 -- Email Notification: SMTP server is down; workaround is to use internal mail API or alternative service (SendGrid/SES)
  4. Priority ranking: Payment Gateway > Data Export > Email Notification (payment is core business with earliest deadline)
  5. Escalation plan: if blockers not resolved by April 5, escalate to director/management level
  6. DBA permission requires director-level escalation if not resolved promptly
primary_dimensions:
- completion
