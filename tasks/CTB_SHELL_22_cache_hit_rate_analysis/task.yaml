task_id: CTB_SHELL_22_cache_hit_rate_analysis
task_name: Cache Hit Rate Analysis
version: '1.0'
category: workflow
difficulty: medium-hard
services:
- name: helpdesk
  command: python mock_services/helpdesk/server.py
  port: 9107
  health_check: http://localhost:9107/helpdesk/tickets
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9107/helpdesk/reset
  env:
    HELPDESK_FIXTURES: tasks/CTB_SHELL_22_cache_hit_rate_analysis/fixtures/helpdesk/tickets.json
    ERROR_RATE: '0'
- name: notes
  command: python mock_services/notes/server.py
  port: 9105
  health_check: http://localhost:9105/notes/list
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9105/notes/reset
  env:
    NOTES_FIXTURES: tasks/CTB_SHELL_22_cache_hit_rate_analysis/fixtures/notes/documents.json
    ERROR_RATE: '0'
prompt:
  text: |
    Database load has spiked significantly and investigation points to declining cache hit rates. Please:
    
    1. Review all tickets to find alerts about cache performance anomalies
    2. Review the caching architecture documentation and configuration notes
    3. Analyze the root cause of hit rate drops for each cache layer and the impact on database load
    4. Generate an analysis report including: cache layer, current hit rate, baseline hit rate, root cause, database impact, and optimization recommendations

  language: en
tools:
- name: helpdesk_list_tickets
  description: List tickets
  input_schema:
    type: object
    properties:
      status:
        type: string
    required: []
- name: helpdesk_get_ticket
  description: Get ticket details
  input_schema:
    type: object
    properties:
      ticket_id:
        type: string
    required:
    - ticket_id
- name: notes_list_documents
  description: List documents
  input_schema:
    type: object
    properties: {}
    required: []
- name: notes_get_document
  description: Get document details
  input_schema:
    type: object
    properties:
      note_id:
        type: string
    required:
    - note_id
tool_endpoints:
- tool_name: helpdesk_list_tickets
  url: http://localhost:9107/helpdesk/tickets
  method: POST
- tool_name: helpdesk_get_ticket
  url: http://localhost:9107/helpdesk/tickets/get
  method: POST
- tool_name: notes_list_documents
  url: http://localhost:9105/notes/list
  method: POST
- tool_name: notes_get_document
  url: http://localhost:9105/notes/get
  method: POST
environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
  - fixtures/helpdesk/tickets.json
  - fixtures/notes/documents.json
scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  1. List tickets: TK-2201 (Redis hit rate dropped from 95% to 60%), TK-2202 (CDN cache miss rate increased), TK-2203 (local cache expired in bulk)
  2. Review docs: note_2201 (caching architecture docs) and note_2202 (cache configuration parameters)
  3. Analysis:
     - TK-2201: Redis keys expired due to maxmemory-policy allkeys-lru eviction after memory spike, hot keys evicted
     - TK-2202: CDN origin shield configuration changed, bypassing cache, origin server traffic increased 3x
     - TK-2203: Application deployment restarted all instances, local cache cold-started simultaneously, thundering herd effect
  4. Remediation: increase Redis maxmemory, revert CDN origin shield config, add cache warmup during deployment

primary_dimensions:
- completion
