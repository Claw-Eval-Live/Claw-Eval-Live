task_id: CTB_SHELL_03_disk_usage_alert
task_name: Disk Usage Alert Analysis
version: '1.0'
category: workflow
difficulty: medium
services:
- name: helpdesk
  command: python mock_services/helpdesk/server.py
  port: 9107
  health_check: http://localhost:9107/helpdesk/tickets
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9107/helpdesk/reset
  env:
    HELPDESK_FIXTURES: tasks/CTB_SHELL_03_disk_usage_alert/fixtures/helpdesk/tickets.json
    ERROR_RATE: '0'
- name: notes
  command: python mock_services/notes/server.py
  port: 9105
  health_check: http://localhost:9105/notes/list
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9105/notes/reset
  env:
    NOTES_FIXTURES: tasks/CTB_SHELL_03_disk_usage_alert/fixtures/notes/documents.json
    ERROR_RATE: '0'
prompt:
  text: |
    The monitoring system has raised disk usage alerts for multiple services. Please proceed as follows:

    1. Review the helpdesk tickets to find all disk usage alert tickets.

    2. Review the notes documents to retrieve the disk threshold policy and cleanup specifications.

    3. Analyze the disk usage for each alert and determine whether it exceeds the defined threshold.

    4. Produce a report that includes: service name, partition, current utilization percentage, threshold value, root cause analysis for the threshold breach, and cleanup recommendations. Sort the results by urgency (highest utilization first).
  language: en
tools:
- name: helpdesk_list_tickets
  description: Get the list of tickets
  input_schema:
    type: object
    properties:
      status:
        type: string
    required: []
- name: helpdesk_get_ticket
  description: Get ticket details
  input_schema:
    type: object
    properties:
      ticket_id:
        type: string
    required:
    - ticket_id
- name: notes_list_documents
  description: Get the list of documents
  input_schema:
    type: object
    properties: {}
    required: []
- name: notes_get_document
  description: Get document details
  input_schema:
    type: object
    properties:
      note_id:
        type: string
    required:
    - note_id
tool_endpoints:
- tool_name: helpdesk_list_tickets
  url: http://localhost:9107/helpdesk/tickets
  method: POST
- tool_name: helpdesk_get_ticket
  url: http://localhost:9107/helpdesk/tickets/get
  method: POST
- tool_name: notes_list_documents
  url: http://localhost:9105/notes/list
  method: POST
- tool_name: notes_get_document
  url: http://localhost:9105/notes/get
  method: POST
environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
  - fixtures/helpdesk/tickets.json
  - fixtures/notes/documents.json
scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  1. List tickets to get TK-301 (prod-web-01 /var/log 95%), TK-302 (prod-db-01 /data 88%), and TK-303 (prod-app-01 /tmp 92%).
  2. Review documents to get note_301 (Disk Threshold Policy) and note_302 (Log Cleanup Specification).
  3. Analysis:
     - prod-web-01 /var/log 95% exceeds threshold 85%, caused by log rotation not running.
     - prod-db-01 /data 88% exceeds threshold 85%, caused by binlog accumulation.
     - prod-app-01 /tmp 92% exceeds threshold 85%, caused by temporary files not being cleaned up.
  4. Urgency ordering: prod-web-01 (95%) > prod-app-01 (92%) > prod-db-01 (88%).
primary_dimensions:
- completion
