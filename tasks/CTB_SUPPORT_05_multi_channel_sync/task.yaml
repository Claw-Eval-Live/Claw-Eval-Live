task_id: CTB_SUPPORT_05_multi_channel_sync
task_name: Multi-Channel Ticket Sync
version: "1.0"
category: workflow
difficulty: medium-hard

services:
  - name: gmail
    command: python mock_services/gmail/server.py
    port: 9100
    health_check: http://localhost:9100/gmail/messages
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9100/gmail/reset
    env:
      GMAIL_FIXTURES: tasks/CTB_SUPPORT_05_multi_channel_sync/fixtures/gmail/inbox.json
      ERROR_RATE: "0"
  - name: helpdesk
    command: python mock_services/helpdesk/server.py
    port: 9107
    health_check: http://localhost:9107/helpdesk/tickets
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9107/helpdesk/reset
    env:
      HELPDESK_FIXTURES: tasks/CTB_SUPPORT_05_multi_channel_sync/fixtures/helpdesk/tickets.json
      ERROR_RATE: "0"

prompt:
  text: |
    Please check the synchronization between the email channel and the ticket system, and identify unlinked customer complaints.

    Specific requirements:
    1. Retrieve all customer complaint emails
    2. Retrieve all ticket records
    3. Comparative analysis:
       - Which email complaints already have corresponding tickets (linked)
       - Which email complaints have no corresponding tickets (unlinked/missed)
    4. For unlinked emails, assess the urgency level and recommend whether a ticket should be created
    5. Produce a sync status report:
       - Linked list (email-to-ticket mapping)
       - Unlinked list (missed email complaints)
       - Recommended follow-up actions

    Please produce a complete multi-channel sync check report.
  language: en

tools:
  - name: gmail_list_messages
    description: List email messages
    input_schema:
      type: object
      properties:
        days_back:
          type: integer
          default: 30
        max_results:
          type: integer
          default: 20
      required: []

  - name: gmail_get_message
    description: Get email message details
    input_schema:
      type: object
      properties:
        message_id:
          type: string
      required: [message_id]

  - name: helpdesk_list_tickets
    description: List tickets
    input_schema:
      type: object
      properties:
        status:
          type: string
      required: []

  - name: helpdesk_get_ticket
    description: Get ticket details
    input_schema:
      type: object
      properties:
        ticket_id:
          type: string
      required: [ticket_id]

tool_endpoints:
  - tool_name: gmail_list_messages
    url: http://localhost:9100/gmail/messages
    method: POST
  - tool_name: gmail_get_message
    url: http://localhost:9100/gmail/messages/get
    method: POST
  - tool_name: helpdesk_list_tickets
    url: http://localhost:9107/helpdesk/tickets
    method: POST
  - tool_name: helpdesk_get_ticket
    url: http://localhost:9107/helpdesk/tickets/get
    method: POST

environment:
  timeout_seconds: 300
  max_turns: 24
  fixtures:
    - fixtures/gmail/inbox.json
    - fixtures/helpdesk/tickets.json

scoring_components: []
safety_checks: []
reference_solution: |
  1. LINKED pairs (3): msg_1001 (zhangsan/Stellar, login locked) <-> MC-001; msg_1003 (liuqi/Grand, Q1 report) <-> MC-002; msg_1004 (chenba/Vision, mobile crash) <-> MC-003
  2. UNLINKED emails (2): msg_1002 (wangwu/Evergreen, data import failure) -- no ticket created; msg_1005 (zhaojiu/Smart Link, API timeout) -- no ticket created
  3. Statistics: 3 linked, 2 unlinked (missed)
  4. Urgency assessment: unlinked emails should be evaluated for urgency and tickets created promptly
  5. Recommendations: create tickets for both missed complaints (wangwu data import, zhaojiu API timeout)
  6. Process improvement: implement automated email-to-ticket sync; establish regular sync check cadence
primary_dimensions: [completion]
