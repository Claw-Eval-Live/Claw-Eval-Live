task_id: CTB_RESEARCH_02_market_trend_synthesis
task_name: Market Trend Synthesis Analysis
version: "1.0"
category: research
difficulty: hard

services:
  - name: web
    command: python mock_services/web/server.py
    port: 9113
    health_check: http://localhost:9113/web/search
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9113/web/reset
    env:
      WEB_FIXTURES: tasks/CTB_RESEARCH_02_market_trend_synthesis/fixtures/web/pages.json
      ERROR_RATE: "0"

  - name: gmail
    command: python mock_services/gmail/server.py
    port: 9100
    health_check: http://localhost:9100/gmail/messages
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9100/gmail/reset
    env:
      GMAIL_FIXTURES: tasks/CTB_RESEARCH_02_market_trend_synthesis/fixtures/gmail/inbox.json
      ERROR_RATE: "0"

prompt:
  text: |
    You are the company's strategic analyst. You need to synthesize multiple industry reports and internal information to produce an AI market trend analysis report. Please:

    1. Search for and review AI market reports published by various agencies (iResearch, Gartner, McKinsey, etc.)
    2. Review emails containing industry analyses and customer demand feedback forwarded by colleagues
    3. Conduct a comprehensive analysis covering:
       - Global and China AI market size and growth rates
       - Key technology trends
       - AI adoption across industries
       - How customer needs align with market trends
    4. Generate a market trend analysis report including:
       - Market size and growth data
       - Three key trends and technology directions
       - AI investment ROI analysis
       - Product recommendations based on customer needs
       - Talent and competitive landscape analysis
  language: en

tools:
  - name: web_search
    description: Search the web
    input_schema:
      type: object
      properties:
        query:
          type: string
      required: [query]

  - name: web_get_page
    description: Retrieve web page content
    input_schema:
      type: object
      properties:
        url:
          type: string
      required: [url]

  - name: gmail_list_messages
    description: List email messages
    input_schema:
      type: object
      properties:
        days_back:
          type: integer
          default: 7
        max_results:
          type: integer
          default: 20
      required: []

  - name: gmail_get_message
    description: Get email message details by message ID
    input_schema:
      type: object
      properties:
        message_id:
          type: string
      required: [message_id]

tool_endpoints:
  - tool_name: web_search
    url: http://localhost:9113/web/search
    method: POST
  - tool_name: web_get_page
    url: http://localhost:9113/web/page
    method: POST
  - tool_name: gmail_list_messages
    url: http://localhost:9100/gmail/messages
    method: POST
  - tool_name: gmail_get_message
    url: http://localhost:9100/gmail/messages/get
    method: POST

environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
    - fixtures/web/pages.json
    - fixtures/gmail/inbox.json

scoring_components: []
expected_actions: []
reference_solution: |
  1. Market size: Global AI market ~$3,200B (~4,250B yuan); China AI market ~$480B (~3,200B yuan)
  2. Growth rate: 33.6% year-over-year
  3. Key trends: LLM/large models, AI Agent, multimodal AI, SaaS+AI integration, edge AI
  4. ROI: average AI ROI 3.5x; financial sector ROI 5.2x
  5. Financial industry AI adoption rate: 72%
  6. AI talent gap: 750,000
  7. Customer demands: smart customer service, automated reports, lead scoring
  8. Sources: iResearch, Gartner, McKinsey, IDC
  9. Report structure: market size section, three key trends section, ROI analysis section, product recommendations, talent/competitive landscape
  10. Product recommendations should be based on customer needs alignment with market trends
primary_dimensions: [completion]
