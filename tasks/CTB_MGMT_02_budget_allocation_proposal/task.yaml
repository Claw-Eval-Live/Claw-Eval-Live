task_id: CTB_MGMT_02_budget_allocation_proposal
task_name: Budget Allocation Proposal
version: "1.0"
category: management
difficulty: hard

services:
  - name: finance
    command: python mock_services/finance/server.py
    port: 9102
    health_check: http://localhost:9102/finance/transactions
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9102/finance/reset
    env:
      FINANCE_FIXTURES: tasks/CTB_MGMT_02_budget_allocation_proposal/fixtures/finance/transactions.json
      ERROR_RATE: "0"

  - name: gmail
    command: python mock_services/gmail/server.py
    port: 9100
    health_check: http://localhost:9100/gmail/messages
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9100/gmail/reset
    env:
      GMAIL_FIXTURES: tasks/CTB_MGMT_02_budget_allocation_proposal/fixtures/gmail/inbox.json
      ERROR_RATE: "0"

prompt:
  text: |
    You are the company's CFO and need to develop the Q2 budget allocation plan. Please:

    1. Review Q1 actual spending data for each department in the finance system
    2. Review emails containing each department's Q2 budget requests and the CEO's total budget notification
    3. Analyze:
       - Q1 spending breakdown by department
       - Q2 total requested amount vs Q2 total budget
       - CEO's priority guidance
    4. Develop the Q2 budget allocation plan:
       - Q2 total budget is 1.8 million CNY
       - Administration and HR departments maintain Q1 levels (245,000 CNY combined)
       - Remaining 1,555,000 CNY to be allocated among Engineering, Marketing, and Sales
       - Factor in Q1 execution results, Q2 request justifications, and CEO priorities
    5. Generate a budget allocation report:
       - Q1 spending analysis
       - Q2 allocation amounts and rationale for each department
       - Whether the total stays within the 1.8 million budget
       - Explanation for departments whose requests were reduced
  language: en

tools:
  - name: finance_list_transactions
    description: Get the list of financial transactions
    input_schema:
      type: object
      properties:
        max_results:
          type: integer
          default: 20
      required: []

  - name: gmail_list_messages
    description: Get the list of emails
    input_schema:
      type: object
      properties:
        days_back:
          type: integer
          default: 7
        max_results:
          type: integer
          default: 20
      required: []

  - name: gmail_get_message
    description: Get email details by message ID
    input_schema:
      type: object
      properties:
        message_id:
          type: string
      required: [message_id]

tool_endpoints:
  - tool_name: finance_list_transactions
    url: http://localhost:9102/finance/transactions
    method: POST
  - tool_name: gmail_list_messages
    url: http://localhost:9100/gmail/messages
    method: POST
  - tool_name: gmail_get_message
    url: http://localhost:9100/gmail/messages/get
    method: POST

environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
    - fixtures/finance/transactions.json
    - fixtures/gmail/inbox.json

scoring_components: []
expected_actions: []
reference_solution: |
  1. Q1 actual spend: Engineering 850K, Marketing 320K, Sales 180K, Admin 150K, HR ~95K; total ~1,595K CNY
  2. Q2 total budget constraint: 1,800,000 CNY
  3. Admin + HR fixed at Q1 levels (~245K combined); remaining ~1,555K for Engineering, Marketing, Sales
  4. CEO priorities: Engineering gets full budget request (AI strategy is top priority)
  5. Marketing must be reduced to fit within budget
  6. Total Q2 requests exceed 1.8M -- need to cut Marketing or Sales
  7. Reductions justified with rationale per department
  8. Complete allocation proposal per department with Q1 vs Q2 comparison
primary_dimensions: [completion]
