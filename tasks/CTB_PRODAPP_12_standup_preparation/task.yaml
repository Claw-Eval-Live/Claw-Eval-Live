task_id: CTB_PRODAPP_12_standup_preparation
task_name: CTB_PRODAPP_12_standup_preparation
version: '1.0'
category: workflow
difficulty: medium
services:
- name: todo
  command: python mock_services/todo/server.py
  port: 9104
  health_check: http://localhost:9104/todo/tasks
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9104/todo/reset
  env:
    ERROR_RATE: '0'
    TODO_FIXTURES: tasks/CTB_PRODAPP_12_standup_preparation/fixtures/todo/tasks.json
- name: notes
  command: python mock_services/notes/server.py
  port: 9105
  health_check: http://localhost:9105/notes/list
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9105/notes/reset
  env:
    ERROR_RATE: '0'
    NOTES_FIXTURES: tasks/CTB_PRODAPP_12_standup_preparation/fixtures/notes/meetings.json
- name: calendar
  command: python mock_services/calendar/server.py
  port: 9101
  health_check: http://localhost:9101/calendar/events
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9101/calendar/reset
  env:
    ERROR_RATE: '0'
    CALENDAR_FIXTURES: tasks/CTB_PRODAPP_12_standup_preparation/fixtures/calendar/events.json
    CALENDAR_DISABLE_DATE_SHIFT: '1'
prompt:
  text: |
    Please prepare a standup meeting summary for the team. Based on each member's task progress in the to-do list, today's meeting schedule from the calendar, and recent notes updates, compile a concise standup briefing. Include: each member's yesterday accomplishments, today's plan, blockers, and key meetings scheduled for today.
  language: en
tools:
- name: todo_list_tasks
  description: Retrieve the to-do task list
  input_schema:
    type: object
    properties:
      status:
        type: string
        description: Filter by status
        default: all
    required: []
- name: todo_update_task
  description: Description
  input_schema:
    type: object
    properties:
      task_id:
        type: string
      status:
        type: string
      priority:
        type: string
    required:
    - task_id
- name: notes_list
  description: Priority level
  input_schema:
    type: object
    properties:
      max_results:
        type: integer
        description: Maximum number of results to return
        default: 10
    required: []
- name: notes_get
  description: Description
  input_schema:
    type: object
    properties:
      note_id:
        type: string
        description: Note ID
    required:
    - note_id
- name: calendar_list_events
  description: Description
  input_schema:
    type: object
    properties:
      date:
        type: string
        description: Start date (YYYY-MM-DD)
      days:
        type: integer
        description: Number of days to view
        default: 1
    required:
    - date
- name: calendar_get_event
  description: Description
  input_schema:
    type: object
    properties:
      event_id:
        type: string
        description: Event ID
    required:
    - event_id
tool_endpoints:
- tool_name: todo_list_tasks
  url: http://localhost:9104/todo/tasks
  method: POST
- tool_name: todo_update_task
  url: http://localhost:9104/todo/tasks/update
  method: POST
- tool_name: notes_list
  url: http://localhost:9105/notes/list
  method: POST
- tool_name: notes_get
  url: http://localhost:9105/notes/get
  method: POST
- tool_name: calendar_list_events
  url: http://localhost:9101/calendar/events
  method: POST
- tool_name: calendar_get_event
  url: http://localhost:9101/calendar/events/get
  method: POST
environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
  - fixtures/todo/tasks.json
  - fixtures/notes/meetings.json
  - fixtures/calendar/events.json
scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  1. Wu Gang: working on payment interface integration; blocker is SDK compatibility issue (v3.1 vs v3.2)
  2. Zheng Xue: order list refactor completed; image upload has requirement change (+4h unplanned work)
  3. Han Bing: deployment pipeline work; blocked by permission issue (needs ops ticket)
  4. Key meetings today: Payment tech review (14:00), Product requirement clarification (16:00)
  5. Each member has yesterday/today/blockers summary
  6. Discussion topics for standup identified
primary_dimensions:
- completion
