task_id: CTB_PRODAPP_15_capacity_forecast
task_name: CTB_PRODAPP_15_capacity_forecast
version: '1.0'
category: workflow
difficulty: medium
services:
- name: calendar
  command: python mock_services/calendar/server.py
  port: 9101
  health_check: http://localhost:9101/calendar/events
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9101/calendar/reset
  env:
    ERROR_RATE: '0'
    CALENDAR_FIXTURES: tasks/CTB_PRODAPP_15_capacity_forecast/fixtures/calendar/events.json
    CALENDAR_DISABLE_DATE_SHIFT: '1'
- name: todo
  command: python mock_services/todo/server.py
  port: 9104
  health_check: http://localhost:9104/todo/tasks
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9104/todo/reset
  env:
    ERROR_RATE: '0'
    TODO_FIXTURES: tasks/CTB_PRODAPP_15_capacity_forecast/fixtures/todo/tasks.json
prompt:
  text: |
    Please forecast team capacity for the next two weeks. Based on each member's current task backlog in the to-do list and committed meetings in the calendar, calculate available working hours per person. Output: per-person capacity forecast, tasks at risk of missing deadlines, and recommendations for workload adjustment.
  language: en
tools:
- name: calendar_list_events
  description: Retrieve calendar events within a specified date range
  input_schema:
    type: object
    properties:
      date:
        type: string
        description: Start date (YYYY-MM-DD)
      days:
        type: integer
        description: Number of days to view
        default: 1
    required:
    - date
- name: calendar_get_event
  description: Description
  input_schema:
    type: object
    properties:
      event_id:
        type: string
        description: Event ID
    required:
    - event_id
- name: todo_list_tasks
  description: Description
  input_schema:
    type: object
    properties:
      status:
        type: string
        description: Filter by status
        default: all
    required: []
- name: todo_update_task
  description: Description
  input_schema:
    type: object
    properties:
      task_id:
        type: string
      status:
        type: string
      priority:
        type: string
    required:
    - task_id
tool_endpoints:
- tool_name: calendar_list_events
  url: http://localhost:9101/calendar/events
  method: POST
- tool_name: calendar_get_event
  url: http://localhost:9101/calendar/events/get
  method: POST
- tool_name: todo_list_tasks
  url: http://localhost:9104/todo/tasks
  method: POST
- tool_name: todo_update_task
  url: http://localhost:9104/todo/tasks/update
  method: POST
environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
  - fixtures/calendar/events.json
  - fixtures/todo/tasks.json
scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  1. Team members: Xie Ming, Cao Li, Yuan Tao, Zhong Yu (4 members total)
  2. Standard capacity: 40h/week per person (8h/day)
  3. Xie Ming: 10.5h meetings + 20h tasks = 30.5h committed, ~9.5h available -- at risk
  4. Cao Li: 7h meetings + 30h tasks = 37h committed, ~3h available -- highest task load, most at risk
  5. Yuan Tao: moderate workload, sufficient available hours
  6. Zhong Yu: moderate workload, sufficient available hours
  7. At-risk tasks: Cao Li's tasks most likely to miss deadlines due to minimal buffer
  8. Xie Ming also at risk with heavy meeting load reducing productive time
  9. Recommendations: redistribute tasks from Cao Li to Yuan Tao or Zhong Yu; reduce Xie Ming's meeting commitments or reassign lower-priority tasks
primary_dimensions:
- completion
