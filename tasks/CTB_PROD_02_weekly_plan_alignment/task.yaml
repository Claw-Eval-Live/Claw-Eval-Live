task_id: CTB_PROD_02_weekly_plan_alignment
task_name: Weekly Plan Three-Source Alignment
version: "1.0"
category: workflow
difficulty: medium

services:
  - name: notes
    command: python mock_services/notes/server.py
    port: 9105
    health_check: http://localhost:9105/notes/list
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9105/notes/reset
    env:
      NOTES_FIXTURES: tasks/CTB_PROD_02_weekly_plan_alignment/fixtures/notes/notes.json
      ERROR_RATE: "0"
  - name: calendar
    command: python mock_services/calendar/server.py
    port: 9101
    health_check: http://localhost:9101/calendar/events
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9101/calendar/reset
    env:
      CALENDAR_FIXTURES: tasks/CTB_PROD_02_weekly_plan_alignment/fixtures/calendar/events.json
      ERROR_RATE: "0"
  - name: todo
    command: python mock_services/todo/server.py
    port: 9104
    health_check: http://localhost:9104/todo/tasks
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9104/todo/reset
    env:
      TODO_FIXTURES: tasks/CTB_PROD_02_weekly_plan_alignment/fixtures/todo/tasks.json
      ERROR_RATE: "0"

prompt:
  text: |
    The team lead has noticed inconsistencies among the weekly meeting notes, calendar, and task management tool. Please perform a three-source alignment analysis.

    Steps:
    1. Read this week's weekly meeting minutes and related memos
    2. Check this week's and next week's calendar events
    3. Check all current tasks in the backlog
    4. Using the weekly meeting resolutions as the baseline, check each item:
       - Does each resolution have a corresponding event on the calendar?
       - Does each resolution have a corresponding task in the TODO system?
       - Are the deadlines consistent?
       - Are the assignees consistent?
    5. Output a three-source alignment report containing:
       - List of consistent items
       - List of inconsistent items (notes value vs. calendar/TODO value)
       - List of missing items (present in notes but missing from calendar or TODO)
       - Recommended follow-up actions
  language: en

tools:
  - name: notes_list
    description: Get the list of notes
    input_schema:
      type: object
      properties:
        search:
          type: string
      required: []
  - name: notes_get
    description: Get note details
    input_schema:
      type: object
      properties:
        note_id:
          type: string
      required: [note_id]
  - name: calendar_list_events
    description: Get calendar events
    input_schema:
      type: object
      properties:
        date:
          type: string
        days:
          type: integer
          default: 14
      required: []
  - name: todo_list_tasks
    description: Get the list of tasks
    input_schema:
      type: object
      properties:
        status:
          type: string
      required: []

tool_endpoints:
  - tool_name: notes_list
    url: http://localhost:9105/notes/list
    method: POST
  - tool_name: notes_get
    url: http://localhost:9105/notes/get
    method: POST
  - tool_name: calendar_list_events
    url: http://localhost:9101/calendar/events
    method: POST
  - tool_name: todo_list_tasks
    url: http://localhost:9104/todo/tasks
    method: POST

environment:
  timeout_seconds: 300
  max_turns: 24
  fixtures:
    - fixtures/notes/notes.json
    - fixtures/calendar/events.json
    - fixtures/todo/tasks.json

scoring_components: []
safety_checks: []
expected_actions: []

reference_solution: |
  Date mismatch: Quarterly report -- notes 3/28 vs TODO 3/31
  Calendar missing: Product launch rehearsal (3/31), Fire drill (3/26 2-3pm)
  TODO missing: Server expansion (Zhao Lei 3/27), Client demo (Zhang Wei), Launch rehearsal
  Consistent: User research (Li Na 3/28), Client demo exists on calendar

primary_dimensions: [completion]
