task_id: CTB_SHELL_23_thread_deadlock_diagnosis
task_name: Thread Deadlock Diagnosis
version: '1.0'
category: workflow
difficulty: hard
services:
- name: helpdesk
  command: python mock_services/helpdesk/server.py
  port: 9107
  health_check: http://localhost:9107/helpdesk/tickets
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9107/helpdesk/reset
  env:
    HELPDESK_FIXTURES: tasks/CTB_SHELL_23_thread_deadlock_diagnosis/fixtures/helpdesk/tickets.json
    ERROR_RATE: '0'
- name: notes
  command: python mock_services/notes/server.py
  port: 9105
  health_check: http://localhost:9105/notes/list
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9105/notes/reset
  env:
    NOTES_FIXTURES: tasks/CTB_SHELL_23_thread_deadlock_diagnosis/fixtures/notes/documents.json
    ERROR_RATE: '0'
prompt:
  text: |
    The application has become unresponsive and thread dumps reveal potential deadlock situations. Please:
    
    1. Review all tickets to find alerts about application hangs and deadlock issues
    2. Review the thread pool configuration documentation and concurrency design notes
    3. Analyze the thread dump information to identify the deadlock chain and root cause
    4. Generate a diagnosis report including: deadlock thread IDs, locked resources, lock acquisition order, root cause, and remediation recommendations

  language: en
tools:
- name: helpdesk_list_tickets
  description: List tickets
  input_schema:
    type: object
    properties:
      status:
        type: string
    required: []
- name: helpdesk_get_ticket
  description: Get ticket details
  input_schema:
    type: object
    properties:
      ticket_id:
        type: string
    required:
    - ticket_id
- name: notes_list_documents
  description: List documents
  input_schema:
    type: object
    properties: {}
    required: []
- name: notes_get_document
  description: Get document details
  input_schema:
    type: object
    properties:
      note_id:
        type: string
    required:
    - note_id
tool_endpoints:
- tool_name: helpdesk_list_tickets
  url: http://localhost:9107/helpdesk/tickets
  method: POST
- tool_name: helpdesk_get_ticket
  url: http://localhost:9107/helpdesk/tickets/get
  method: POST
- tool_name: notes_list_documents
  url: http://localhost:9105/notes/list
  method: POST
- tool_name: notes_get_document
  url: http://localhost:9105/notes/get
  method: POST
environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
  - fixtures/helpdesk/tickets.json
  - fixtures/notes/documents.json
scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  1. List tickets: TK-2301 (order-service unresponsive), TK-2302 (thread dump shows BLOCKED threads), TK-2303 (database connection pool exhausted)
  2. Review docs: note_2301 (thread pool configuration) and note_2302 (concurrency design documentation)
  3. Analysis:
     - Thread-101 holds lock on AccountLock and waiting for InventoryLock
     - Thread-102 holds lock on InventoryLock and waiting for AccountLock
     - Classic AB-BA deadlock pattern, lock acquisition order not consistent
     - Database connection pool exhausted because BLOCKED threads hold connections
  4. Remediation: enforce consistent lock ordering (Account before Inventory), add lock timeout, implement connection pool monitoring

primary_dimensions:
- completion
