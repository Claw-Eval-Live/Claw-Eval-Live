task_id: CTB_WORKFLOW_10_product_launch_checklist
task_name: Product Launch Checklist
version: '1.0'
category: workflow
difficulty: hard
services:
- name: todo
  command: python mock_services/todo/server.py
  port: 9104
  health_check: http://localhost:9104/todo/tasks
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9104/todo/reset
  env:
    TODO_FIXTURES: tasks/CTB_WORKFLOW_10_product_launch_checklist/fixtures/todo/tasks.json
    ERROR_RATE: '0'
- name: gmail
  command: python mock_services/gmail/server.py
  port: 9100
  health_check: http://localhost:9100/gmail/messages
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9100/gmail/reset
  env:
    GMAIL_FIXTURES: tasks/CTB_WORKFLOW_10_product_launch_checklist/fixtures/gmail/inbox.json
    ERROR_RATE: '0'
- name: calendar
  command: python mock_services/calendar/server.py
  port: 9101
  health_check: http://localhost:9101/calendar/events
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9101/calendar/reset
  env:
    CALENDAR_FIXTURES: tasks/CTB_WORKFLOW_10_product_launch_checklist/fixtures/calendar/events.json
    ERROR_RATE: '0'
- name: notes
  command: python mock_services/notes/server.py
  port: 9105
  health_check: http://localhost:9105/notes/list
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9105/notes/reset
  env:
    NOTES_FIXTURES: tasks/CTB_WORKFLOW_10_product_launch_checklist/fixtures/notes/documents.json
    ERROR_RATE: '0'
prompt:
  text: |
    As a product operations manager, please coordinate the pre-launch checklist for a new product release. Please:
    
    1. Review emails for the launch plan, stakeholder sign-offs, and blocking issues
    2. Check internal notes for the release checklist template and QA results
    3. Create to-do items for each checklist item: QA sign-off, docs update, support training, go/no-go
    4. Schedule the go/no-go meeting and launch window on the calendar
    5. Output a launch readiness report with checklist status, blockers, and recommendations

  language: en
tools:
- name: todo_list_tasks
  description: List to-do tasks
  input_schema:
    type: object
    properties:
      status:
        type: string
    required: []
- name: gmail_list_messages
  description: List email messages
  input_schema:
    type: object
    properties:
      days_back:
        type: integer
        default: 7
    required: []
- name: gmail_get_message
  description: Get email message details
  input_schema:
    type: object
    properties:
      message_id:
        type: string
    required:
    - message_id
- name: calendar_list_events
  description: List calendar events
  input_schema:
    type: object
    properties:
      start_date:
        type: string
    required: []
- name: notes_list_documents
  description: List note documents
  input_schema:
    type: object
    properties:
      tag:
        type: string
    required: []
- name: notes_get_document
  description: Get document details
  input_schema:
    type: object
    properties:
      note_id:
        type: string
    required:
    - note_id
tool_endpoints:
- tool_name: todo_list_tasks
  url: http://localhost:9104/todo/tasks
  method: POST
- tool_name: gmail_list_messages
  url: http://localhost:9100/gmail/messages
  method: POST
- tool_name: gmail_get_message
  url: http://localhost:9100/gmail/messages/get
  method: POST
- tool_name: calendar_list_events
  url: http://localhost:9101/calendar/events
  method: POST
- tool_name: notes_list_documents
  url: http://localhost:9105/notes/list
  method: POST
- tool_name: notes_get_document
  url: http://localhost:9105/notes/get
  method: POST
environment:
  timeout_seconds: 300
  max_turns: 30
  fixtures:
  - fixtures/todo/tasks.json
  - fixtures/gmail/inbox.json
  - fixtures/calendar/events.json
  - fixtures/notes/documents.json
scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  1. Read launch plan email (v2.5 release, target: April 20, 3 new features)
  2. Review release checklist and QA results from notes (2 P2 bugs pending)
  3. Create to-dos: fix P2 bugs, update user docs, train support team, prepare rollback plan
  4. Schedule go/no-go meeting April 18, launch window April 20 2:00 AM
  5. Report: 8-item checklist, 2 blockers (P2 bugs), recommendation: conditional go if bugs fixed by April 17

primary_dimensions:
- completion
