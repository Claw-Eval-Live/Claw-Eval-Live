task_id: CTB_SHELL_01_log_error_diagnosis
task_name: Log Error Diagnosis
version: '1.0'
category: workflow
difficulty: medium
services:
- name: helpdesk
  command: python mock_services/helpdesk/server.py
  port: 9107
  health_check: http://localhost:9107/helpdesk/tickets
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9107/helpdesk/reset
  env:
    HELPDESK_FIXTURES: tasks/CTB_SHELL_01_log_error_diagnosis/fixtures/helpdesk/tickets.json
    ERROR_RATE: '0'
- name: notes
  command: python mock_services/notes/server.py
  port: 9105
  health_check: http://localhost:9105/notes/list
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9105/notes/reset
  env:
    NOTES_FIXTURES: tasks/CTB_SHELL_01_log_error_diagnosis/fixtures/notes/documents.json
    ERROR_RATE: '0'
prompt:
  text: |
    The monitoring system has recorded multiple log error alerts across several services. Please proceed as follows:

    1. Review the helpdesk tickets to find all log error alert tickets.

    2. Review the notes documents to retrieve the service configuration details.

    3. Cross-reference the alerts with the service configurations to diagnose the probable cause of each error.

    4. Produce a comprehensive diagnostic report that includes: the error description for each alert, the affected service, the probable root cause, and recommended remediation actions.

    Please organize the report by priority (most critical first).
  language: en
tools:
- name: helpdesk_list_tickets
  description: Get the list of tickets
  input_schema:
    type: object
    properties:
      status:
        type: string
    required: []
- name: helpdesk_get_ticket
  description: Get ticket details
  input_schema:
    type: object
    properties:
      ticket_id:
        type: string
    required:
    - ticket_id
- name: notes_list_documents
  description: Get the list of documents
  input_schema:
    type: object
    properties: {}
    required: []
- name: notes_get_document
  description: Get document details
  input_schema:
    type: object
    properties:
      note_id:
        type: string
    required:
    - note_id
tool_endpoints:
- tool_name: helpdesk_list_tickets
  url: http://localhost:9107/helpdesk/tickets
  method: POST
- tool_name: helpdesk_get_ticket
  url: http://localhost:9107/helpdesk/tickets/get
  method: POST
- tool_name: notes_list_documents
  url: http://localhost:9105/notes/list
  method: POST
- tool_name: notes_get_document
  url: http://localhost:9105/notes/get
  method: POST
environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
  - fixtures/helpdesk/tickets.json
  - fixtures/notes/documents.json
scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  1. List tickets to get TK-101 (OOM Error), TK-102 (Connection Timeout), and TK-103 (NullPointer Anomaly).
  2. Review the document list to get note_101 (payment-service config) and note_102 (order-service config).
  3. Diagnostic report:
     - TK-101 OOM: payment-service JVM heap memory configured at 512MB; recommend increasing to 2GB and checking for memory leaks.
     - TK-102 Connection Timeout: order-service database connection pool max=10 is too small; recommend increasing to 50 and checking for slow queries.
     - TK-103 NullPointer: payment-service encountering null values; need to check for data format changes in third-party API.
  4. Priority ordering: OOM > Connection Timeout > NullPointer.
primary_dimensions:
- completion
