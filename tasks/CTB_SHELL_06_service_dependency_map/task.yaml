task_id: CTB_SHELL_06_service_dependency_map
task_name: Service Dependency Map
version: '1.0'
category: workflow
difficulty: medium
services:
- name: helpdesk
  command: python mock_services/helpdesk/server.py
  port: 9107
  health_check: http://localhost:9107/helpdesk/tickets
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9107/helpdesk/reset
  env:
    HELPDESK_FIXTURES: tasks/CTB_SHELL_06_service_dependency_map/fixtures/helpdesk/tickets.json
    ERROR_RATE: '0'
- name: notes
  command: python mock_services/notes/server.py
  port: 9105
  health_check: http://localhost:9105/notes/list
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9105/notes/reset
  env:
    NOTES_FIXTURES: tasks/CTB_SHELL_06_service_dependency_map/fixtures/notes/documents.json
    ERROR_RATE: '0'
prompt:
  text: |
    A cascading failure recently occurred, affecting multiple services. Please:

    1. Review all tickets to find alerts related to the cascading failure
    2. Review the service architecture documentation in the notes
    3. Based on the failure propagation path and architecture docs, map out the service dependencies
    4. Generate an analysis report including: root cause, propagation path, list of affected services, dependency diagram (text description), and improvement recommendations to prevent cascading failures
  language: en
tools:
- name: helpdesk_list_tickets
  description: List tickets
  input_schema:
    type: object
    properties:
      status:
        type: string
    required: []
- name: helpdesk_get_ticket
  description: Get ticket details
  input_schema:
    type: object
    properties:
      ticket_id:
        type: string
    required:
    - ticket_id
- name: notes_list_documents
  description: List documents
  input_schema:
    type: object
    properties: {}
    required: []
- name: notes_get_document
  description: Get document details
  input_schema:
    type: object
    properties:
      note_id:
        type: string
    required:
    - note_id
tool_endpoints:
- tool_name: helpdesk_list_tickets
  url: http://localhost:9107/helpdesk/tickets
  method: POST
- tool_name: helpdesk_get_ticket
  url: http://localhost:9107/helpdesk/tickets/get
  method: POST
- tool_name: notes_list_documents
  url: http://localhost:9105/notes/list
  method: POST
- tool_name: notes_get_document
  url: http://localhost:9105/notes/get
  method: POST
environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
  - fixtures/helpdesk/tickets.json
  - fixtures/notes/documents.json
scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  1. List tickets: TK-601 (Redis cluster failure), TK-602 (user-service unavailable), TK-603 (order-service timeout), TK-604 (payment-service failure)
  2. Review docs: note_601 (microservice architecture doc) and note_602 (service dependency matrix)
  3. Analysis:
     - Root cause: Redis cluster master node crashed
     - Propagation path: Redis -> user-service (session cache failure) -> API Gateway (auth failure) -> order-service (order failure) -> payment-service (payment failure)
     - Dependencies: API Gateway -> user-service -> Redis; order-service -> user-service + payment-service; payment-service -> Redis
  4. Recommendations: circuit breaker, degradation strategy, Redis sentinel/cluster HA, local cache fallback
primary_dimensions:
- completion
