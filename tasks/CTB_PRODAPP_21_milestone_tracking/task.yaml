task_id: CTB_PRODAPP_21_milestone_tracking
task_name: CTB_PRODAPP_21_milestone_tracking
version: '1.0'
category: workflow
difficulty: medium
services:
- name: todo
  command: python mock_services/todo/server.py
  port: 9104
  health_check: http://localhost:9104/todo/tasks
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9104/todo/reset
  env:
    ERROR_RATE: '0'
    TODO_FIXTURES: tasks/CTB_PRODAPP_21_milestone_tracking/fixtures/todo/tasks.json
- name: calendar
  command: python mock_services/calendar/server.py
  port: 9101
  health_check: http://localhost:9101/calendar/events
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9101/calendar/reset
  env:
    ERROR_RATE: '0'
    CALENDAR_FIXTURES: tasks/CTB_PRODAPP_21_milestone_tracking/fixtures/calendar/events.json
    CALENDAR_DISABLE_DATE_SHIFT: '1'
- name: notes
  command: python mock_services/notes/server.py
  port: 9105
  health_check: http://localhost:9105/notes/list
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9105/notes/reset
  env:
    ERROR_RATE: '0'
    NOTES_FIXTURES: tasks/CTB_PRODAPP_21_milestone_tracking/fixtures/notes/meetings.json
prompt:
  text: |
    Please track project milestone progress. Based on milestone-related tasks in the to-do list, scheduled milestone reviews in the calendar, and milestone definitions in notes, assess the status of each milestone. Output: milestone status dashboard, at-risk milestones, completion percentage, and recommended actions.
  language: en
tools:
- name: todo_list_tasks
  description: Retrieve the to-do task list
  input_schema:
    type: object
    properties:
      status:
        type: string
        description: Filter by status
        default: all
    required: []
- name: todo_update_task
  description: Description
  input_schema:
    type: object
    properties:
      task_id:
        type: string
      status:
        type: string
      priority:
        type: string
    required:
    - task_id
- name: calendar_list_events
  description: Priority level
  input_schema:
    type: object
    properties:
      date:
        type: string
        description: Start date (YYYY-MM-DD)
      days:
        type: integer
        description: Number of days to view
        default: 1
    required:
    - date
- name: calendar_get_event
  description: Description
  input_schema:
    type: object
    properties:
      event_id:
        type: string
        description: Event ID
    required:
    - event_id
- name: notes_list
  description: Description
  input_schema:
    type: object
    properties:
      max_results:
        type: integer
        description: Maximum number of results to return
        default: 10
    required: []
- name: notes_get
  description: Description
  input_schema:
    type: object
    properties:
      note_id:
        type: string
        description: Note ID
    required:
    - note_id
tool_endpoints:
- tool_name: todo_list_tasks
  url: http://localhost:9104/todo/tasks
  method: POST
- tool_name: todo_update_task
  url: http://localhost:9104/todo/tasks/update
  method: POST
- tool_name: calendar_list_events
  url: http://localhost:9101/calendar/events
  method: POST
- tool_name: calendar_get_event
  url: http://localhost:9101/calendar/events/get
  method: POST
- tool_name: notes_list
  url: http://localhost:9105/notes/list
  method: POST
- tool_name: notes_get
  url: http://localhost:9105/notes/get
  method: POST
environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
  - fixtures/todo/tasks.json
  - fixtures/calendar/events.json
  - fixtures/notes/meetings.json
scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  1. Milestone 1: COMPLETE -- requirements freeze done, all tasks finished
  2. Milestone 2: AT RISK -- 75% complete; mobile frontend delayed; needs extra 8 hours; may slip 1-2 days
  3. Milestone 3: CASCADE RISK -- depends on MS2 completion; includes integration testing and performance testing
  4. Overall project health: YELLOW (at risk but recoverable)
  5. Performance risk from MS1: response time measured at 200ms, needs optimization
  6. Actions: address MS2 mobile delay via resource reallocation or scope reduction
  7. Actions: monitor cascade impact on MS3; plan for performance optimization of 200ms latency issue
  8. Recommend risk mitigation plan with specific next steps per milestone
primary_dimensions:
- completion
