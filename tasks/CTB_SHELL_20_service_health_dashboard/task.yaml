task_id: CTB_SHELL_20_service_health_dashboard
task_name: Service Health Dashboard
version: '1.0'
category: workflow
difficulty: medium-hard
services:
- name: helpdesk
  command: python mock_services/helpdesk/server.py
  port: 9107
  health_check: http://localhost:9107/helpdesk/tickets
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9107/helpdesk/reset
  env:
    HELPDESK_FIXTURES: tasks/CTB_SHELL_20_service_health_dashboard/fixtures/helpdesk/tickets.json
    ERROR_RATE: '0'
- name: notes
  command: python mock_services/notes/server.py
  port: 9105
  health_check: http://localhost:9105/notes/list
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9105/notes/reset
  env:
    NOTES_FIXTURES: tasks/CTB_SHELL_20_service_health_dashboard/fixtures/notes/documents.json
    ERROR_RATE: '0'
prompt:
  text: |
    Management has requested a comprehensive service health status report. Please:
    
    1. Review all tickets to understand the current status and recent issues of each service
    2. Review the service SLA documentation and monitoring configuration notes
    3. Summarize the health status of each service
    4. Generate a health dashboard report including: service name, current status, uptime, recent incident count, SLA compliance, and key metrics

  language: en
tools:
- name: helpdesk_list_tickets
  description: List tickets
  input_schema:
    type: object
    properties:
      status:
        type: string
    required: []
- name: helpdesk_get_ticket
  description: Get ticket details
  input_schema:
    type: object
    properties:
      ticket_id:
        type: string
    required:
    - ticket_id
- name: notes_list_documents
  description: List documents
  input_schema:
    type: object
    properties: {}
    required: []
- name: notes_get_document
  description: Get document details
  input_schema:
    type: object
    properties:
      note_id:
        type: string
    required:
    - note_id
tool_endpoints:
- tool_name: helpdesk_list_tickets
  url: http://localhost:9107/helpdesk/tickets
  method: POST
- tool_name: helpdesk_get_ticket
  url: http://localhost:9107/helpdesk/tickets/get
  method: POST
- tool_name: notes_list_documents
  url: http://localhost:9105/notes/list
  method: POST
- tool_name: notes_get_document
  url: http://localhost:9105/notes/get
  method: POST
environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
  - fixtures/helpdesk/tickets.json
  - fixtures/notes/documents.json
scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  1. List tickets: TK-2001 (API Gateway latency spike), TK-2002 (database replication lag), TK-2003 (message queue backlog)
  2. Review docs: note_2001 (service SLA docs) and note_2002 (monitoring dashboard config)
  3. Analysis:
     - API Gateway: P99 latency rose from 200ms to 1.2s, SLA requires <500ms, non-compliant
     - Database: replication lag reached 30s, SLA requires <5s, non-compliant
     - Message queue: consumer backlog 50K messages, processing rate dropping
  4. Summary: 2 services SLA non-compliant, 1 at risk. Recommend priority attention to DB replication and GW latency.

primary_dimensions:
- completion
