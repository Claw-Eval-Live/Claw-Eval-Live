task_id: CTB_PRODAPP_14_meeting_notes_sync
task_name: CTB_PRODAPP_14_meeting_notes_sync
version: '1.0'
category: workflow
difficulty: medium
services:
- name: notes
  command: python mock_services/notes/server.py
  port: 9105
  health_check: http://localhost:9105/notes/list
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9105/notes/reset
  env:
    ERROR_RATE: '0'
    NOTES_FIXTURES: tasks/CTB_PRODAPP_14_meeting_notes_sync/fixtures/notes/meetings.json
- name: todo
  command: python mock_services/todo/server.py
  port: 9104
  health_check: http://localhost:9104/todo/tasks
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9104/todo/reset
  env:
    ERROR_RATE: '0'
    TODO_FIXTURES: tasks/CTB_PRODAPP_14_meeting_notes_sync/fixtures/todo/tasks.json
prompt:
  text: |
    Please check if meeting notes are properly synced with action items. Compare meeting records in notes against tasks in the to-do system to identify any action items from meetings that are not tracked. Output: sync status per meeting, untracked action items, and recommendations for task creation.
  language: en
tools:
- name: notes_list
  description: Retrieve the list of notes/documents
  input_schema:
    type: object
    properties:
      max_results:
        type: integer
        description: Maximum number of results to return
        default: 10
    required: []
- name: notes_get
  description: Description
  input_schema:
    type: object
    properties:
      note_id:
        type: string
        description: Note ID
    required:
    - note_id
- name: todo_list_tasks
  description: Description
  input_schema:
    type: object
    properties:
      status:
        type: string
        description: Filter by status
        default: all
    required: []
- name: todo_update_task
  description: Description
  input_schema:
    type: object
    properties:
      task_id:
        type: string
      status:
        type: string
      priority:
        type: string
    required:
    - task_id
tool_endpoints:
- tool_name: notes_list
  url: http://localhost:9105/notes/list
  method: POST
- tool_name: notes_get
  url: http://localhost:9105/notes/get
  method: POST
- tool_name: todo_list_tasks
  url: http://localhost:9104/todo/tasks
  method: POST
- tool_name: todo_update_task
  url: http://localhost:9104/todo/tasks/update
  method: POST
environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
  - fixtures/notes/meetings.json
  - fixtures/todo/tasks.json
scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  1. Missing from todo: auto-classification feature (from product planning meeting)
  2. Missing from todo: batch export feature (from customer requirements review)
  3. Missing from todo: data masking plan (from security compliance meeting)
  4. Missing from todo: SSO integration or data visualization dashboard (from customer requirements)
  5. Missing from todo: GDPR compliance review or TLS1.3 upgrade (from security compliance)
  6. Each missing item should have create action, assignee, priority, and timeline recommendation
primary_dimensions:
- completion
