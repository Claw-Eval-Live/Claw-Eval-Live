task_id: CTB_OPS_04_cross_team_dependency_map
task_name: cross_team_dependency_map
version: "1.0"
category: workflow
difficulty: hard

services:
  - name: gmail
    command: python mock_services/gmail/server.py
    port: 9100
    health_check: http://localhost:9100/gmail/messages
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9100/gmail/reset
    env:
      GMAIL_FIXTURES: tasks/CTB_OPS_04_cross_team_dependency_map/fixtures/gmail/inbox.json
      ERROR_RATE: "0"
  - name: todo
    command: python mock_services/todo/server.py
    port: 9104
    health_check: http://localhost:9104/todo/tasks
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9104/todo/reset
    env:
      TODO_FIXTURES: tasks/CTB_OPS_04_cross_team_dependency_map/fixtures/todo/tasks.json
      ERROR_RATE: "0"

prompt:
  text: |
    Please analyze the task dependencies across teams and identify blocking chains and risks.

    Specific requirements:
    1. Review all to-do tasks and team communication emails
    2. Map out the dependency chains between tasks (describe in text)
    3. Identify critical blocking chains: which tasks are being blocked and by whom
    4. Identify delay risks: which tasks may not be completed on time due to upstream delays
    5. Find bottleneck teams on the critical path
    6. Provide recommendations to unblock dependencies with priority ranking

    Please output a complete cross-team dependency analysis report.
  language: en

tools:
  - name: gmail_list_messages
    description: Retrieve the list of emails
    input_schema:
      type: object
      properties:
        days_back:
          type: integer
          default: 7
        max_results:
          type: integer
          default: 20
      required: []

  - name: gmail_get_message
    description: Retrieve email details
    input_schema:
      type: object
      properties:
        message_id:
          type: string
      required: [message_id]

  - name: todo_list_tasks
    description: Retrieve the task list
    input_schema:
      type: object
      properties:
        status:
          type: string
        assignee:
          type: string
      required: []

  - name: todo_get_task
    description: Retrieve task details
    input_schema:
      type: object
      properties:
        task_id:
          type: string
      required: [task_id]

tool_endpoints:
  - tool_name: gmail_list_messages
    url: http://localhost:9100/gmail/messages
    method: POST
  - tool_name: gmail_get_message
    url: http://localhost:9100/gmail/messages/get
    method: POST
  - tool_name: todo_list_tasks
    url: http://localhost:9104/todo/tasks
    method: POST
  - tool_name: todo_get_task
    url: http://localhost:9104/todo/tasks/get
    method: POST

environment:
  timeout_seconds: 300
  max_turns: 24
  fixtures:
    - fixtures/gmail/inbox.json
    - fixtures/todo/tasks.json

scoring_components: []
safety_checks: []
reference_solution: |
  1. Chain 1 (User Service): ops -> dba -> backend -> frontend
  2. Chain 2 (Design Flow): pm -> design -> frontend
  3. Chain 3 (Payment Launch): security + ops + qa -> payment launch
  4. Critical path: ops -> dba -> backend -> frontend
  5. Bottleneck: ops team (blocks both chains 1 and 3)
  6. DBA migration delayed from 3/26 to 3/29, causing cascade delay to backend and frontend
  7. Recommendations: prioritize unblocking ops first, then accelerate dba migration
  8. Consider parallel execution where possible
primary_dimensions: [completion]
