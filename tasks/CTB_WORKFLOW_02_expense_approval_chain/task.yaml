task_id: CTB_WORKFLOW_02_expense_approval_chain
task_name: Expense Approval Chain
version: "1.0"
category: workflow
difficulty: hard

services:
  - name: gmail
    command: python mock_services/gmail/server.py
    port: 9100
    health_check: http://localhost:9100/gmail/messages
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9100/gmail/reset
    env:
      GMAIL_FIXTURES: tasks/CTB_WORKFLOW_02_expense_approval_chain/fixtures/gmail/inbox.json
      ERROR_RATE: "0"
  - name: finance
    command: python mock_services/finance/server.py
    port: 9102
    health_check: http://localhost:9102/finance/transactions
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9102/finance/reset
    env:
      FINANCE_FIXTURES: tasks/CTB_WORKFLOW_02_expense_approval_chain/fixtures/finance/transactions.json
      ERROR_RATE: "0"
  - name: todo
    command: python mock_services/todo/server.py
    port: 9104
    health_check: http://localhost:9104/todo/tasks
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9104/todo/reset
    env:
      TODO_FIXTURES: tasks/CTB_WORKFLOW_02_expense_approval_chain/fixtures/todo/tasks.json
      ERROR_RATE: "0"

prompt:
  text: |
    As a finance coordinator, please process the pending expense reports. Please:
    
    1. Review emails for submitted expense reports and approval requests
    2. Check the finance system for transaction records and budget status
    3. Review each expense against policy (meal limit, travel per-diem, receipt requirements)
    4. Create to-do items for required approvals or follow-ups
    5. Output an expense processing report: each expense with amount, category, policy compliance, approval status, and action items

  language: en

tools:
  - name: gmail_list_messages
    description: List email messages
    input_schema:
      type: object
      properties:
        days_back:
          type: integer
          default: 7
      required: []
  - name: gmail_get_message
    description: Get email message details
    input_schema:
      type: object
      properties:
        message_id:
          type: string
      required: [message_id]
  - name: finance_list_transactions
    description: List transaction records
    input_schema:
      type: object
      properties:
        start_date:
          type: string
      required: []
  - name: todo_list_tasks
    description: List to-do tasks
    input_schema:
      type: object
      properties:
        status:
          type: string
      required: []
  - name: todo_create_task
    description: Create a to-do task
    input_schema:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        priority:
          type: string
        due_date:
          type: string
      required: [title]

tool_endpoints:
  - tool_name: gmail_list_messages
    url: http://localhost:9100/gmail/messages
    method: POST
  - tool_name: gmail_get_message
    url: http://localhost:9100/gmail/messages/get
    method: POST
  - tool_name: finance_list_transactions
    url: http://localhost:9102/finance/transactions
    method: POST
  - tool_name: todo_list_tasks
    url: http://localhost:9104/todo/tasks
    method: POST
  - tool_name: todo_create_task
    url: http://localhost:9104/todo/tasks/create
    method: POST

environment:
  timeout_seconds: 300
  max_turns: 30
  fixtures:
    - fixtures/gmail/inbox.json
    - fixtures/finance/transactions.json
    - fixtures/todo/tasks.json

scoring_components: []
safety_checks: []
expected_actions:
  - service: todo
    action_key: tasks
    required: true

reference_solution: |
  1. Read expense emails: 3 reports (marketing event $5K, business travel $3.2K, team dinner $800)
  2. Check finance system for budget remaining and past transactions
  3. Analysis: marketing event within budget, travel needs receipts for 2 items, dinner exceeds per-person limit
  4. Create to-dos: request missing receipts, flag dinner overage for manager approval
  5. Report: 1 approved, 1 pending receipts, 1 needs manager override

primary_dimensions: [completion]
