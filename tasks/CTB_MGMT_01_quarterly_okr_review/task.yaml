task_id: CTB_MGMT_01_quarterly_okr_review
task_name: Quarterly OKR Review
version: '1.0'
category: management
difficulty: medium
services:
- name: notes
  command: python mock_services/notes/server.py
  port: 9105
  health_check: http://localhost:9105/notes/list
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9105/notes/reset
  env:
    NOTES_FIXTURES: tasks/CTB_MGMT_01_quarterly_okr_review/fixtures/notes/documents.json
    ERROR_RATE: '0'
- name: todo
  command: python mock_services/todo/server.py
  port: 9104
  health_check: http://localhost:9104/todo/tasks
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9104/todo/reset
  env:
    TODO_FIXTURES: tasks/CTB_MGMT_01_quarterly_okr_review/fixtures/todo/tasks.json
    ERROR_RATE: '0'
prompt:
  text: |
    You are the company's COO and need to conduct a Q1 OKR review for each department. Please:

    1. Review the Q1 OKR definitions and actual completion data for each department in internal documents
    2. Check completed and outstanding tasks in the task management system
    3. Calculate the achievement rate for each KR in every department:
       - Achievement rate = Actual value / Target value (in percentage form)
       - For "less-than-or-equal" metrics (e.g., number of incidents), an actual value below the target counts as exceeding the goal
    4. Generate a Q1 OKR review report:
       - Overall OKR achievement score for each department
       - Specific achievement rate for each KR
       - Best-performing department and the department most in need of improvement
       - Root cause analysis for underperforming KRs and Q2 improvement recommendations
  language: en
tools:
- name: notes_list_documents
  description: Get the list of documents
  input_schema:
    type: object
    properties:
      max_results:
        type: integer
        default: 20
    required: []
- name: notes_get_document
  description: Get document details by document ID
  input_schema:
    type: object
    properties:
      note_id:
        type: string
    required:
    - note_id
- name: todo_list_tasks
  description: Get the list of tasks
  input_schema:
    type: object
    properties:
      max_results:
        type: integer
        default: 20
    required: []
- name: todo_get_task
  description: Get task details by task ID
  input_schema:
    type: object
    properties:
      task_id:
        type: string
    required:
    - task_id
tool_endpoints:
- tool_name: notes_list_documents
  url: http://localhost:9105/notes/list
  method: POST
- tool_name: notes_get_document
  url: http://localhost:9105/notes/get
  method: POST
- tool_name: todo_list_tasks
  url: http://localhost:9104/todo/tasks
  method: POST
- tool_name: todo_get_task
  url: http://localhost:9104/todo/tasks/get
  method: POST
environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
  - fixtures/notes/documents.json
  - fixtures/todo/tasks.json
scoring_components: []
expected_actions: []
reference_solution: |
  1. Engineering: KR1 uptime 99.92% (achievement ~100%), KR2 P0 incidents ~5 (achievement ~66.7%, MISS), KR3 deploy time ~12min (achievement ~120%)
  2. Marketing: KR1 traffic +24.8% (achievement ~124%), KR2 leads 500 (achievement 100%), KR3 NPS +10pts (achievement ~125%)
  3. Sales: KR1 revenue 9M (achievement 112.5%), KR2 new customers 28 (achievement 112%), KR3 retention 93.1% (achievement ~103.5%)
  4. Best performing department: Sales (all KRs exceeded)
  5. Needs improvement: Engineering (KR2 miss -- too many P0 incidents)
  6. Root cause: reliability/incident management issues in Engineering
  7. Q2 recommendations: Engineering should focus on incident prevention and SRE practices
primary_dimensions:
- completion
