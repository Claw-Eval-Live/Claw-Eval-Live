task_id: CTB_DATA_09_ticket_email_crm_reconcile
task_name: Ticket-Email-CRM Three-Way Reconciliation
version: "1.0"
category: workflow
difficulty: medium-hard

services:
  - name: helpdesk
    command: python mock_services/helpdesk/server.py
    port: 9107
    health_check: http://localhost:9107/helpdesk/tickets
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9107/helpdesk/reset
    env:
      HELPDESK_FIXTURES: tasks/CTB_DATA_09_ticket_email_crm_reconcile/fixtures/helpdesk/tickets.json
      ERROR_RATE: "0"
  - name: gmail
    command: python mock_services/gmail/server.py
    port: 9100
    health_check: http://localhost:9100/gmail/messages
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9100/gmail/reset
    env:
      GMAIL_FIXTURES: tasks/CTB_DATA_09_ticket_email_crm_reconcile/fixtures/gmail/inbox.json
      ERROR_RATE: "0"
  - name: crm
    command: python mock_services/crm/server.py
    port: 9110
    health_check: http://localhost:9110/crm/customers
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9110/crm/reset
    env:
      CRM_FIXTURES: tasks/CTB_DATA_09_ticket_email_crm_reconcile/fixtures/crm/customers.json
      ERROR_RATE: "0"

prompt:
  text: |
    The customer service manager needs you to reconcile customer complaint emails, helpdesk tickets, and CRM data for consistency.

    Steps:
    1. Retrieve all current tickets from the helpdesk system
    2. Read recent customer support emails
    3. Query related customer information from CRM
    4. Cross-reference all three sources to identify the following issues:
       - Email mentions a new issue but no matching ticket in the helpdesk system
       - Email says issue is resolved but ticket status has not been updated
       - Email is from a customer that does not exist in CRM
       - Ticket customer's tier in CRM (VIP tickets should be prioritized)
    5. Output a reconciliation report:
       - Comparison results for each customer email vs corresponding ticket
       - List of new tickets to be created
       - List of existing tickets to be closed/updated
       - Priority alerts for unresolved VIP customer tickets
  language: en

tools:
  - name: helpdesk_list_tickets
    description: List helpdesk tickets
    input_schema:
      type: object
      properties:
        status:
          type: string
        priority:
          type: string
      required: []
  - name: helpdesk_get_ticket
    description: Get ticket details
    input_schema:
      type: object
      properties:
        ticket_id:
          type: string
      required: [ticket_id]
  - name: gmail_list_messages
    description: List email messages
    input_schema:
      type: object
      properties:
        days_back:
          type: integer
          default: 7
      required: []
  - name: gmail_get_message
    description: Get email message details
    input_schema:
      type: object
      properties:
        message_id:
          type: string
      required: [message_id]
  - name: crm_list_customers
    description: List customers
    input_schema:
      type: object
      properties:
        status:
          type: string
      required: []
  - name: crm_search_customer
    description: Search customer by email
    input_schema:
      type: object
      properties:
        email:
          type: string
      required: []

tool_endpoints:
  - tool_name: helpdesk_list_tickets
    url: http://localhost:9107/helpdesk/tickets
    method: POST
  - tool_name: helpdesk_get_ticket
    url: http://localhost:9107/helpdesk/tickets/get
    method: POST
  - tool_name: gmail_list_messages
    url: http://localhost:9100/gmail/messages
    method: POST
  - tool_name: gmail_get_message
    url: http://localhost:9100/gmail/messages/get
    method: POST
  - tool_name: crm_list_customers
    url: http://localhost:9110/crm/customers
    method: POST
  - tool_name: crm_search_customer
    url: http://localhost:9110/crm/customers/search
    method: POST

environment:
  timeout_seconds: 300
  max_turns: 24
  fixtures:
    - fixtures/helpdesk/tickets.json
    - fixtures/gmail/inbox.json
    - fixtures/crm/customers.json

scoring_components: []
safety_checks: []
expected_actions: []

reference_solution: |
  1. Alpha(TK-501): Email mentions new issue (order search) -> no matching ticket -> needs creation
  2. Beta(TK-502): Email says self-resolved -> ticket still in_progress -> needs closure
  3. Zeta(msg_1603): Email complaint -> no ticket + not in CRM -> needs ticket + CRM record creation
  4. VIP alert: Alpha(TK-501), Gamma(TK-503), Epsilon(TK-505) have unresolved tickets

primary_dimensions: [completion]
