task_id: CTB_IR_07
task_name: Vendor Comparison
version: '1.0'
category: workflow
difficulty: medium
services:
- name: web
  command: python mock_services/web/server.py
  port: 9113
  health_check: http://localhost:9113/web/search
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9113/web/reset
  env:
    WEB_SEARCH_FIXTURES: tasks/CTB_IR_07_vendor_comparison/fixtures/web/search_results.json
    ERROR_RATE: '0'
prompt:
  text: |
    Please search for the latest product information and user reviews of major domestic cloud computing vendors in 2026 (Alibaba Cloud, Tencent Cloud, Huawei Cloud, China Telecom Cloud, etc.) and conduct a comparative evaluation across the following dimensions: 1) Compute performance and availability; 2) Pricing structure and cost-effectiveness; 3) Security and compliance capabilities; 4) Technical support and service responsiveness. Generate a detailed vendor comparison report with recommended rankings.
  language: en
tools:
- name: web_search
  description: Search the web
  input_schema:
    type: object
    properties:
      query:
        type: string
        description: Search keywords
    required:
    - query
- name: web_get_page
  description: Fetch web page content
  input_schema:
    type: object
    properties:
      url:
        type: string
        description: Web page URL
    required:
    - url
tool_endpoints:
- tool_name: web_search
  url: http://localhost:9113/web/search
  method: POST
- tool_name: web_get_page
  url: http://localhost:9113/web/fetch
  method: POST
environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
  - fixtures/web/search_results.json
scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  1. Vendors evaluated: Alibaba Cloud, Huawei Cloud, Tencent Cloud, China Telecom Cloud
  2. Market share: Alibaba Cloud 33.1%
  3. SLA: Alibaba Cloud 99.995% availability
  4. 2C4G instance pricing: Alibaba Cloud 398/mo, Huawei Cloud 375/mo, Tencent Cloud 389/mo, China Telecom Cloud 329/mo (cheapest)
  5. Response time: Alibaba Cloud 12 minutes (fastest)
  6. Security: Level 3 classified protection (MLPS), ISO 27701 certification
  7. Report should include multi-dimensional ranking (compute, pricing, security, support)
  8. Overall recommendation with justification and comparative table
primary_dimensions:
- completion
