task_id: CTB_SHELL_08_backup_verification
task_name: Backup Verification
version: '1.0'
category: workflow
difficulty: medium
services:
- name: helpdesk
  command: python mock_services/helpdesk/server.py
  port: 9107
  health_check: http://localhost:9107/helpdesk/tickets
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9107/helpdesk/reset
  env:
    HELPDESK_FIXTURES: tasks/CTB_SHELL_08_backup_verification/fixtures/helpdesk/tickets.json
    ERROR_RATE: '0'
- name: notes
  command: python mock_services/notes/server.py
  port: 9105
  health_check: http://localhost:9105/notes/list
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9105/notes/reset
  env:
    NOTES_FIXTURES: tasks/CTB_SHELL_08_backup_verification/fixtures/notes/documents.json
    ERROR_RATE: '0'
prompt:
  text: |
    Several recent data restore attempts have failed, calling into question backup integrity. Please:
    
    1. Review all tickets to find alerts about backup failures
    2. Review the backup strategy documentation and backup verification logs in the notes
    3. Verify the integrity and recoverability of each backup task
    4. Generate a backup verification report including: backup task name, backup type, last success time, last verification result, data integrity status, and remediation recommendations

  language: en
tools:
- name: helpdesk_list_tickets
  description: List tickets
  input_schema:
    type: object
    properties:
      status:
        type: string
    required: []
- name: helpdesk_get_ticket
  description: Get ticket details
  input_schema:
    type: object
    properties:
      ticket_id:
        type: string
    required:
    - ticket_id
- name: notes_list_documents
  description: List documents
  input_schema:
    type: object
    properties: {}
    required: []
- name: notes_get_document
  description: Get document details
  input_schema:
    type: object
    properties:
      note_id:
        type: string
    required:
    - note_id
tool_endpoints:
- tool_name: helpdesk_list_tickets
  url: http://localhost:9107/helpdesk/tickets
  method: POST
- tool_name: helpdesk_get_ticket
  url: http://localhost:9107/helpdesk/tickets/get
  method: POST
- tool_name: notes_list_documents
  url: http://localhost:9105/notes/list
  method: POST
- tool_name: notes_get_document
  url: http://localhost:9105/notes/get
  method: POST
environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
  - fixtures/helpdesk/tickets.json
  - fixtures/notes/documents.json
scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  1. List tickets: TK-801 (MySQL backup restore failed), TK-802 (file backup incomplete), TK-803 (Redis RDB backup corrupted)
  2. Review docs: note_801 (backup strategy documentation) and note_802 (backup verification log)
  3. Analysis:
     - TK-801 MySQL: mysqldump file truncated, cron killed by OOM during backup, data incomplete
     - TK-802 File backup: rsync excluded /data/uploads directory, 8GB of data not backed up
     - TK-803 Redis: RDB file corrupted, checksum mismatch, probably disk I/O error during save
  4. Remediation: increase memory for MySQL backup, fix rsync exclusion rules, enable Redis AOF as secondary backup

primary_dimensions:
- completion
