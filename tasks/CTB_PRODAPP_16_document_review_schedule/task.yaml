task_id: CTB_PRODAPP_16_document_review_schedule
task_name: CTB_PRODAPP_16_document_review_schedule
version: '1.0'
category: workflow
difficulty: medium
services:
- name: notes
  command: python mock_services/notes/server.py
  port: 9105
  health_check: http://localhost:9105/notes/list
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9105/notes/reset
  env:
    ERROR_RATE: '0'
    NOTES_FIXTURES: tasks/CTB_PRODAPP_16_document_review_schedule/fixtures/notes/meetings.json
- name: calendar
  command: python mock_services/calendar/server.py
  port: 9101
  health_check: http://localhost:9101/calendar/events
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9101/calendar/reset
  env:
    ERROR_RATE: '0'
    CALENDAR_FIXTURES: tasks/CTB_PRODAPP_16_document_review_schedule/fixtures/calendar/events.json
    CALENDAR_DISABLE_DATE_SHIFT: '1'
prompt:
  text: |
    Please create a document review schedule. Based on documents pending review in notes and team availability in the calendar, arrange an optimal review schedule. Output: review schedule with assigned reviewers, time slots, and priority ordering for each document.
  language: en
tools:
- name: notes_list
  description: Retrieve the list of notes/documents
  input_schema:
    type: object
    properties:
      max_results:
        type: integer
        description: Maximum number of results to return
        default: 10
    required: []
- name: notes_get
  description: Description
  input_schema:
    type: object
    properties:
      note_id:
        type: string
        description: Note ID
    required:
    - note_id
- name: calendar_list_events
  description: Description
  input_schema:
    type: object
    properties:
      date:
        type: string
        description: Start date (YYYY-MM-DD)
      days:
        type: integer
        description: Number of days to view
        default: 1
    required:
    - date
- name: calendar_get_event
  description: Description
  input_schema:
    type: object
    properties:
      event_id:
        type: string
        description: Event ID
    required:
    - event_id
tool_endpoints:
- tool_name: notes_list
  url: http://localhost:9105/notes/list
  method: POST
- tool_name: notes_get
  url: http://localhost:9105/notes/get
  method: POST
- tool_name: calendar_list_events
  url: http://localhost:9101/calendar/events
  method: POST
- tool_name: calendar_get_event
  url: http://localhost:9101/calendar/events/get
  method: POST
environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
  - fixtures/notes/meetings.json
  - fixtures/calendar/events.json
scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  1. Documents to schedule: Microservice Architecture (doc-1), DB Migration (doc-2), API Interface (doc-3), Security Hardening (doc-4)
  2. Priority ordering: DB Migration is urgent (deadline 4/12) -- schedule first; Security Hardening deadline 4/8 -- must be reviewed before then
  3. Authors: Zhe Fang authored doc-1 and doc-4; Min He authored doc-2; Si Lu authored doc-3
  4. Constraint: no self-review -- author cannot be their own reviewer
  5. Calendar conflicts must be avoided; check team availability for free slots
  6. Assign reviewers to available time slots, ensuring no scheduling overlaps
  7. Security Hardening review must be completed before April 8
  8. DB Migration review should be scheduled earliest due to urgency
primary_dimensions:
- completion
