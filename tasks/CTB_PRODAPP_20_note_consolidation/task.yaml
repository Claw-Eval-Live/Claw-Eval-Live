task_id: CTB_PRODAPP_20_note_consolidation
task_name: CTB_PRODAPP_20_note_consolidation
version: '1.0'
category: workflow
difficulty: medium
services:
- name: notes
  command: python mock_services/notes/server.py
  port: 9105
  health_check: http://localhost:9105/notes/list
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9105/notes/reset
  env:
    ERROR_RATE: '0'
    NOTES_FIXTURES: tasks/CTB_PRODAPP_20_note_consolidation/fixtures/notes/meetings.json
prompt:
  text: |
    Please consolidate scattered notes into organized summaries. Review all notes to identify related topics, merge duplicates, and create consolidated summaries. Output: grouped topic summaries, identified duplicates, recommended merges, and an organized knowledge structure.
  language: en
tools:
- name: notes_list
  description: Retrieve the list of notes/documents
  input_schema:
    type: object
    properties:
      max_results:
        type: integer
        description: Maximum number of results to return
        default: 10
    required: []
- name: notes_get
  description: Description
  input_schema:
    type: object
    properties:
      note_id:
        type: string
        description: Note ID
    required:
    - note_id
tool_endpoints:
- tool_name: notes_list
  url: http://localhost:9105/notes/list
  method: POST
- tool_name: notes_get
  url: http://localhost:9105/notes/get
  method: POST
environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
  - fixtures/notes/meetings.json
scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  1. Topic: Cache architecture -- consolidate scattered cache-related notes
  2. Expiry policy: Dynamic expiry times (1h for user info, 15min for product, 5min for inventory) supersede the old 30-minute uniform expiry policy
  3. Architecture: Redis + local cache dual-layer design
  4. Consistency strategy: Cache-Aside pattern + message queue for eventual consistency
  5. Monitoring: Prometheus + Grafana; hit rate thresholds at 80% (warning) and 60% (critical)
  6. Capacity planning: 3 primary + 3 replica nodes; memory specs 4GB, 800MB, 200MB, 500MB
  7. Duplicate identified: the 30-min uniform expiry note is superseded/outdated -- replaced by dynamic expiry note
  8. Recommend merging related notes into a single organized cache architecture knowledge base
primary_dimensions:
- completion
