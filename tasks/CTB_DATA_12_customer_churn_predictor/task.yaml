task_id: CTB_DATA_12_customer_churn_predictor
task_name: Customer Churn Risk Assessment
version: "1.0"
category: workflow
difficulty: medium

services:
  - name: gmail
    command: python mock_services/gmail/server.py
    port: 9100
    health_check: http://localhost:9100/gmail/messages
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9100/gmail/reset
    env:
      GMAIL_FIXTURES: tasks/CTB_DATA_12_customer_churn_predictor/fixtures/gmail/inbox.json
      ERROR_RATE: "0"
  - name: crm
    command: python mock_services/crm/server.py
    port: 9110
    health_check: http://localhost:9110/crm/customers
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9110/crm/reset
    env:
      CRM_FIXTURES: tasks/CTB_DATA_12_customer_churn_predictor/fixtures/crm/customers.json
      ERROR_RATE: "0"

prompt:
  text: |
    Assess customer churn risk. Combine email and CRM data to evaluate each customer's churn probability, rank them by risk level, and develop retention strategies for high-risk customers.
  language: en

tools:
  - name: gmail_list_messages
    description: List email messages
    input_schema:
      type: object
      properties:
        days_back:
          type: integer
          default: 7
      required: []
  - name: gmail_get_message
    description: Get email message details
    input_schema:
      type: object
      properties:
        message_id:
          type: string
      required: [message_id]
  - name: crm_list_customers
    description: List customers
    input_schema:
      type: object
      properties:
        status:
          type: string
      required: []
  - name: crm_get_customer
    description: Get customer details
    input_schema:
      type: object
      properties:
        customer_id:
          type: string
      required: [customer_id]

tool_endpoints:
  - tool_name: gmail_list_messages
    url: http://localhost:9100/gmail/messages
    method: POST
  - tool_name: gmail_get_message
    url: http://localhost:9100/gmail/messages/get
    method: POST
  - tool_name: crm_list_customers
    url: http://localhost:9110/crm/customers
    method: POST
  - tool_name: crm_get_customer
    url: http://localhost:9110/crm/customers/get
    method: POST

environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
    - fixtures/gmail/inbox.json
    - fixtures/crm/customers.json

scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  High risk: A (low usage 12% + considering switch), B (VIP + 5 complaints + threatening), D (refund request + SLA breach + contract expiring soon). Low risk: C (satisfied + upsell). Total at-risk revenue 750K.
primary_dimensions: [completion]
