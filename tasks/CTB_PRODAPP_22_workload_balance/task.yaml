task_id: CTB_PRODAPP_22_workload_balance
task_name: CTB_PRODAPP_22_workload_balance
version: '1.0'
category: workflow
difficulty: medium
services:
- name: calendar
  command: python mock_services/calendar/server.py
  port: 9101
  health_check: http://localhost:9101/calendar/events
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9101/calendar/reset
  env:
    ERROR_RATE: '0'
    CALENDAR_FIXTURES: tasks/CTB_PRODAPP_22_workload_balance/fixtures/calendar/events.json
    CALENDAR_DISABLE_DATE_SHIFT: '1'
- name: todo
  command: python mock_services/todo/server.py
  port: 9104
  health_check: http://localhost:9104/todo/tasks
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9104/todo/reset
  env:
    ERROR_RATE: '0'
    TODO_FIXTURES: tasks/CTB_PRODAPP_22_workload_balance/fixtures/todo/tasks.json
prompt:
  text: |
    Please analyze and balance team workload. Based on task assignments in the to-do list and meeting load in the calendar, identify workload imbalances. Output: per-person workload analysis (tasks + meetings), imbalance indicators, and specific task redistribution recommendations.
  language: en
tools:
- name: calendar_list_events
  description: Retrieve calendar events within a specified date range
  input_schema:
    type: object
    properties:
      date:
        type: string
        description: Start date (YYYY-MM-DD)
      days:
        type: integer
        description: Number of days to view
        default: 1
    required:
    - date
- name: calendar_get_event
  description: Description
  input_schema:
    type: object
    properties:
      event_id:
        type: string
        description: Event ID
    required:
    - event_id
- name: todo_list_tasks
  description: Description
  input_schema:
    type: object
    properties:
      status:
        type: string
        description: Filter by status
        default: all
    required: []
- name: todo_update_task
  description: Description
  input_schema:
    type: object
    properties:
      task_id:
        type: string
      status:
        type: string
      priority:
        type: string
    required:
    - task_id
tool_endpoints:
- tool_name: calendar_list_events
  url: http://localhost:9101/calendar/events
  method: POST
- tool_name: calendar_get_event
  url: http://localhost:9101/calendar/events/get
  method: POST
- tool_name: todo_list_tasks
  url: http://localhost:9104/todo/tasks
  method: POST
- tool_name: todo_update_task
  url: http://localhost:9104/todo/tasks/update
  method: POST
environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
  - fixtures/calendar/events.json
  - fixtures/todo/tasks.json
scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  1. Lu Xin: 8.5h meetings + 40h tasks (microservice refactor 30h + API doc 10h) = ~48.5h total -- severely OVERLOADED
  2. Xia Lin: 3h meetings + 8h tasks (frontend component) = ~11h total
  3. Jia Wei: 6h meetings + 6h tasks (DB index optimization) = ~12h total
  4. Cui Jing: 2.5h meetings + 5h tasks (deployment script) = ~7.5h total -- significantly UNDERLOADED
  5. Imbalance: Lu Xin at ~48.5h is extreme overload; Cui Jing at ~7.5h has most available capacity
  6. Primary recommendation: transfer API doc task (todo_002, 10h) from Lu Xin to Cui Jing
  7. Result: Lu Xin reduces to ~38.5h (still high but manageable); Cui Jing increases to ~17.5h (balanced)
  8. Output as JSON with workload_summary, imbalance_analysis, and rebalance_plan fields
primary_dimensions:
- completion
