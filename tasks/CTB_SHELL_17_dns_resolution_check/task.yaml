task_id: CTB_SHELL_17_dns_resolution_check
task_name: DNS Resolution Check
version: '1.0'
category: workflow
difficulty: medium
services:
- name: helpdesk
  command: python mock_services/helpdesk/server.py
  port: 9107
  health_check: http://localhost:9107/helpdesk/tickets
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9107/helpdesk/reset
  env:
    HELPDESK_FIXTURES: tasks/CTB_SHELL_17_dns_resolution_check/fixtures/helpdesk/tickets.json
    ERROR_RATE: '0'
- name: notes
  command: python mock_services/notes/server.py
  port: 9105
  health_check: http://localhost:9105/notes/list
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9105/notes/reset
  env:
    NOTES_FIXTURES: tasks/CTB_SHELL_17_dns_resolution_check/fixtures/notes/documents.json
    ERROR_RATE: '0'
prompt:
  text: |
    Users are reporting intermittent access issues with some services, suspected to be DNS-related. Please:
    
    1. Review all tickets to find DNS-related alerts
    2. Review the DNS configuration documentation and domain management notes
    3. Analyze the root cause of DNS resolution issues and their impact scope
    4. Generate a DNS diagnosis report including: affected domains, resolution status, root cause, impact scope, and remediation recommendations

  language: en
tools:
- name: helpdesk_list_tickets
  description: List tickets
  input_schema:
    type: object
    properties:
      status:
        type: string
    required: []
- name: helpdesk_get_ticket
  description: Get ticket details
  input_schema:
    type: object
    properties:
      ticket_id:
        type: string
    required:
    - ticket_id
- name: notes_list_documents
  description: List documents
  input_schema:
    type: object
    properties: {}
    required: []
- name: notes_get_document
  description: Get document details
  input_schema:
    type: object
    properties:
      note_id:
        type: string
    required:
    - note_id
tool_endpoints:
- tool_name: helpdesk_list_tickets
  url: http://localhost:9107/helpdesk/tickets
  method: POST
- tool_name: helpdesk_get_ticket
  url: http://localhost:9107/helpdesk/tickets/get
  method: POST
- tool_name: notes_list_documents
  url: http://localhost:9105/notes/list
  method: POST
- tool_name: notes_get_document
  url: http://localhost:9105/notes/get
  method: POST
environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
  - fixtures/helpdesk/tickets.json
  - fixtures/notes/documents.json
scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  1. List tickets: TK-1701 (internal domain resolution failure), TK-1702 (external domain resolution slow), TK-1703 (DNS cache poisoning suspected)
  2. Review docs: note_1701 (DNS architecture docs) and note_1702 (domain management list)
  3. Analysis:
     - TK-1701: Internal DNS server dns-01 disk full, zone file update failed, internal services affected
     - TK-1702: Upstream ISP DNS intermittent, TTL too low causing frequent queries
     - TK-1703: Resolved IP does not match expected, suspected cache pollution, affecting cdn.example.com
  4. Remediation: clean dns-01 disk, raise TTL, flush and verify DNS cache, consider switching to a public DNS like 8.8.8.8

primary_dimensions:
- completion
