task_id: CTB_W06_fullstack_dev_repair
task_name: Full-Stack Dev Environment Repair
version: "1.0"
category: terminal
difficulty: medium-hard

services: []

prompt:
  text: |
    Container files:

    - /workspace/project/README_DEV.md
    - /workspace/project/config/backend.env
    - /workspace/project/frontend/.env.local
    - /workspace/project/proxy/dev_proxy.json
    - /workspace/project/logs/dev_boot.log
    - /workspace/project/scripts/check_dev_stack.py

    The local full-stack development environment is failing to start. Your task:
    1. Read `README_DEV.md` and `dev_boot.log` first to understand the true root cause chain — do not just fix the last error you see
    2. Fix the following 3 configuration files so the local dev stack is consistent again:
       - `/workspace/project/config/backend.env`
       - `/workspace/project/frontend/.env.local`
       - `/workspace/project/proxy/dev_proxy.json`
    3. Keep file paths and overall structure unchanged — do not alter business logic
    4. Run `python /workspace/project/scripts/check_dev_stack.py` and confirm it outputs `DEV_STACK_OK`
    5. Write a `/workspace/DEV_ENV_FIX.md` explaining:
       - The true root cause
       - Which errors were merely downstream symptoms
       - Exactly which configuration values you changed
       - How you verified the fix

    Constraints:
    - Do not modify `check_dev_stack.py`
    - Do not modify the log file or README
    - Do not add any additional services
    - Do not change local dev configuration to production configuration
  language: en

tools: []
tool_endpoints: []

sandbox_files:
  - project/README_DEV.md
  - project/config/backend.env
  - project/frontend/.env.local
  - project/proxy/dev_proxy.json
  - project/logs/dev_boot.log
  - project/scripts/check_dev_stack.py

sandbox_grader_files:
  - fixtures/verify_dev_stack.py

env_snapshot_commands:
  - python /workspace/project/scripts/check_dev_stack.py
  - python /workspace/fixtures/verify_dev_stack.py
  - test -f /workspace/DEV_ENV_FIX.md && echo EXISTS || echo MISSING

environment:
  timeout_seconds: 600
  max_turns: 30

scoring_components: []
safety_checks: []
expected_actions: []

judge_rubric: ""
reference_solution: |
  1. The root cause is not a single service crash — it is an incomplete migration from the old `9001 + /api/v2 + external auth` config to the new local dev contract, where values were not updated consistently
  2. backend.env needs to be fixed to:
     - APP_MODE=dev
     - API_PORT=9101
     - DB_HOST=postgres-dev
     - PUBLIC_API_PATH=/api
     - SESSION_MODE=local
     - STACK_OUTPUT_DIR=/workspace/output/dev-stack
  3. frontend/.env.local needs to be fixed to:
     - VITE_API_ORIGIN=http://localhost:9101
     - VITE_API_PATH=/api
     - VITE_DEV_PROXY_PORT=3000
     - VITE_LOGIN_MODE=local
  4. dev_proxy.json needs to be fixed to:
     - listen=3000
     - /api -> http://backend:9101/api
     - /auth -> http://backend:9101/auth
     - websocket -> ws://backend:9101/socket
  5. check_dev_stack.py must output DEV_STACK_OK and generate /workspace/output/dev-stack/dev_stack_status.json

primary_dimensions: [completion, robustness]
