task_id: CTB_HR_04_salary_adjustment_review
task_name: Salary Adjustment Review
version: "1.0"
category: workflow
difficulty: medium
services:
  - name: gmail
    command: python mock_services/gmail/server.py
    port: 9100
    health_check: http://localhost:9100/gmail/messages
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9100/gmail/reset
    env:
      GMAIL_FIXTURES: tasks/CTB_HR_04_salary_adjustment_review/fixtures/gmail/inbox.json
      ERROR_RATE: "0"
  - name: crm
    command: python mock_services/crm/server.py
    port: 9110
    health_check: http://localhost:9110/crm/customers
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9110/crm/reset
    env:
      CRM_FIXTURES: tasks/CTB_HR_04_salary_adjustment_review/fixtures/crm/customers.json
      ERROR_RATE: "0"
prompt:
  text: |
    Please review the pending salary adjustment requests and prepare a recommendation report.
    
    Requirements:
    1. Retrieve employee records with salary data
    2. Review emails for salary adjustment requests and manager justifications
    3. For each adjustment request, evaluate:
       - Current salary vs market benchmark
       - Performance rating
       - Tenure and last adjustment date
       - Budget availability
       - Manager's justification
    4. Classify each request as: Approve, Approve with modification, or Defer
    5. Generate a salary adjustment review report with recommendations
  language: en
tools:
  - name: gmail_list_messages
    description: List email messages
    input_schema:
      type: object
      properties:
        days_back:
          type: integer
          default: 7
      required: []
  - name: gmail_get_message
    description: Get email message details
    input_schema:
      type: object
      properties:
        message_id:
          type: string
      required: [message_id]
  - name: crm_list_customers
    description: List personnel records
    input_schema:
      type: object
      properties:
        status:
          type: string
      required: []
  - name: crm_get_customer
    description: Get personnel details
    input_schema:
      type: object
      properties:
        customer_id:
          type: string
      required: [customer_id]
tool_endpoints:
  - tool_name: gmail_list_messages
    url: http://localhost:9100/gmail/messages
    method: POST
  - tool_name: gmail_get_message
    url: http://localhost:9100/gmail/messages/get
    method: POST
  - tool_name: crm_list_customers
    url: http://localhost:9110/crm/customers
    method: POST
  - tool_name: crm_get_customer
    url: http://localhost:9110/crm/customers/get
    method: POST
environment:
  timeout_seconds: 300
  max_turns: 24
  fixtures:
    - fixtures/gmail/inbox.json
    - fixtures/crm/customers.json
scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  Engineering: Li Qiang +5000, Zhao Yang +3000, Qian Xiaolei +2000, total increment 10000/month, budget 15000, within limit. Li Qiang increase 20% > 15% requires VP approval, Zhao Yang 16.7% > 15% requires VP approval.
  Marketing: Wu Fang +4000, Lin Zhiming +2000, total increment 6000/month, budget 6000, exactly at limit. Wu Fang 18.2% > 15% requires VP approval, Lin Zhiming 16.7% > 15% requires VP approval.
  Finance: Zheng Tao +2000, total increment 2000/month, budget 3000, within limit. Increase 12.5% < 15%, no special approval needed.
primary_dimensions: [completion]
