task_id: CTB_SHELL_18_container_restart_analysis
task_name: Container Restart Analysis
version: '1.0'
category: workflow
difficulty: medium-hard
services:
- name: helpdesk
  command: python mock_services/helpdesk/server.py
  port: 9107
  health_check: http://localhost:9107/helpdesk/tickets
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9107/helpdesk/reset
  env:
    HELPDESK_FIXTURES: tasks/CTB_SHELL_18_container_restart_analysis/fixtures/helpdesk/tickets.json
    ERROR_RATE: '0'
- name: notes
  command: python mock_services/notes/server.py
  port: 9105
  health_check: http://localhost:9105/notes/list
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9105/notes/reset
  env:
    NOTES_FIXTURES: tasks/CTB_SHELL_18_container_restart_analysis/fixtures/notes/documents.json
    ERROR_RATE: '0'
prompt:
  text: |
    Multiple containers in the Kubernetes cluster are frequently restarting. Please:
    
    1. Review all tickets to find alerts about container restart anomalies
    2. Review the Kubernetes cluster documentation and resource allocation notes
    3. Analyze the root cause of each container's restarts
    4. Generate an analysis report including: Pod name, restart count, root cause, resource utilization, and remediation recommendations

  language: en
tools:
- name: helpdesk_list_tickets
  description: List tickets
  input_schema:
    type: object
    properties:
      status:
        type: string
    required: []
- name: helpdesk_get_ticket
  description: Get ticket details
  input_schema:
    type: object
    properties:
      ticket_id:
        type: string
    required:
    - ticket_id
- name: notes_list_documents
  description: List documents
  input_schema:
    type: object
    properties: {}
    required: []
- name: notes_get_document
  description: Get document details
  input_schema:
    type: object
    properties:
      note_id:
        type: string
    required:
    - note_id
tool_endpoints:
- tool_name: helpdesk_list_tickets
  url: http://localhost:9107/helpdesk/tickets
  method: POST
- tool_name: helpdesk_get_ticket
  url: http://localhost:9107/helpdesk/tickets/get
  method: POST
- tool_name: notes_list_documents
  url: http://localhost:9105/notes/list
  method: POST
- tool_name: notes_get_document
  url: http://localhost:9105/notes/get
  method: POST
environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
  - fixtures/helpdesk/tickets.json
  - fixtures/notes/documents.json
scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  1. List tickets: TK-1801 (payment-service OOMKilled), TK-1802 (log-collector CrashLoopBackOff), TK-1803 (scheduler liveness probe failure)
  2. Review docs: note_1801 (K8s resource quota docs) and note_1802 (container health check config)
  3. Analysis:
     - TK-1801: payment-service memory limit 512Mi insufficient, actual usage peaks at 620Mi, triggers OOMKilled
     - TK-1802: log-collector startup fails, target log path does not exist, enters CrashLoopBackOff
     - TK-1803: scheduler liveness probe times out under high load, probe timeout 1s is too aggressive
  4. Remediation: raise memory limit to 1Gi, fix log path, increase liveness probe timeout to 5s

primary_dimensions:
- completion
