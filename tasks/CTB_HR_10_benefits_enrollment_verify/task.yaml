task_id: CTB_HR_10_benefits_enrollment_verify
task_name: Benefits Enrollment Verify
version: "1.0"
category: workflow
difficulty: medium
services:
  - name: gmail
    command: python mock_services/gmail/server.py
    port: 9100
    health_check: http://localhost:9100/gmail/messages
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9100/gmail/reset
    env:
      GMAIL_FIXTURES: tasks/CTB_HR_10_benefits_enrollment_verify/fixtures/gmail/inbox.json
      ERROR_RATE: "0"
  - name: crm
    command: python mock_services/crm/server.py
    port: 9110
    health_check: http://localhost:9110/crm/customers
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9110/crm/reset
    env:
      CRM_FIXTURES: tasks/CTB_HR_10_benefits_enrollment_verify/fixtures/crm/customers.json
      ERROR_RATE: "0"
prompt:
  text: |
    Please verify the annual benefits enrollment data for completeness and accuracy.
    
    Requirements:
    1. Retrieve employee benefits enrollment records
    2. Review emails for any enrollment issues or questions
    3. For each employee, verify:
       - All required benefits selections are made
       - Dependent information is complete
       - No conflicting selections
       - Enrollment within the valid window
    4. Identify employees with incomplete or missing enrollments
    5. Generate a verification report with:
       - Enrollment completion statistics
       - List of employees with issues
       - Required follow-up actions
  language: en
tools:
  - name: gmail_list_messages
    description: List email messages
    input_schema:
      type: object
      properties:
        days_back:
          type: integer
          default: 7
      required: []
  - name: gmail_get_message
    description: Get email message details
    input_schema:
      type: object
      properties:
        message_id:
          type: string
      required: [message_id]
  - name: crm_list_customers
    description: List personnel records
    input_schema:
      type: object
      properties:
        status:
          type: string
      required: []
  - name: crm_get_customer
    description: Get personnel details
    input_schema:
      type: object
      properties:
        customer_id:
          type: string
      required: [customer_id]
tool_endpoints:
  - tool_name: gmail_list_messages
    url: http://localhost:9100/gmail/messages
    method: POST
  - tool_name: gmail_get_message
    url: http://localhost:9100/gmail/messages/get
    method: POST
  - tool_name: crm_list_customers
    url: http://localhost:9110/crm/customers
    method: POST
  - tool_name: crm_get_customer
    url: http://localhost:9110/crm/customers/get
    method: POST
environment:
  timeout_seconds: 300
  max_turns: 24
  fixtures:
    - fixtures/gmail/inbox.json
    - fixtures/crm/customers.json
scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  Zhang Wei (EMP-1001): Fully compliant. Annuity 5% = maximum limit, OK.
  Liu Yang (EMP-1002): Child education subsidy non-compliant (joined June 2025, less than 2 years tenure). Others OK.
  Chen Jing (EMP-1003): Rent subsidy non-compliant (already has housing fund, cannot receive both). Others OK.
  Zhao Li (EMP-1004): Plan C non-compliant (director level and above only, she is marketing supervisor not director); annuity 8% exceeds 5% cap, requires special approval.
primary_dimensions: [completion]
