task_id: CTB_SHELL_19_log_rotation_audit
task_name: Log Rotation Audit
version: '1.0'
category: workflow
difficulty: medium-hard
services:
- name: helpdesk
  command: python mock_services/helpdesk/server.py
  port: 9107
  health_check: http://localhost:9107/helpdesk/tickets
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9107/helpdesk/reset
  env:
    HELPDESK_FIXTURES: tasks/CTB_SHELL_19_log_rotation_audit/fixtures/helpdesk/tickets.json
    ERROR_RATE: '0'
- name: notes
  command: python mock_services/notes/server.py
  port: 9105
  health_check: http://localhost:9105/notes/list
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9105/notes/reset
  env:
    NOTES_FIXTURES: tasks/CTB_SHELL_19_log_rotation_audit/fixtures/notes/documents.json
    ERROR_RATE: '0'
prompt:
  text: |
    Server disk usage has been rising and upon investigation, log files are taking up excessive space. Please:
    
    1. Review all tickets to find alerts about log and disk usage anomalies
    2. Review the log rotation configuration documentation and disk monitoring notes
    3. Analyze the log rotation configuration for each service and identify issues
    4. Generate an audit report including: service name, log path, current size, rotation configuration, identified issues, and remediation recommendations

  language: en
tools:
- name: helpdesk_list_tickets
  description: List tickets
  input_schema:
    type: object
    properties:
      status:
        type: string
    required: []
- name: helpdesk_get_ticket
  description: Get ticket details
  input_schema:
    type: object
    properties:
      ticket_id:
        type: string
    required:
    - ticket_id
- name: notes_list_documents
  description: List documents
  input_schema:
    type: object
    properties: {}
    required: []
- name: notes_get_document
  description: Get document details
  input_schema:
    type: object
    properties:
      note_id:
        type: string
    required:
    - note_id
tool_endpoints:
- tool_name: helpdesk_list_tickets
  url: http://localhost:9107/helpdesk/tickets
  method: POST
- tool_name: helpdesk_get_ticket
  url: http://localhost:9107/helpdesk/tickets/get
  method: POST
- tool_name: notes_list_documents
  url: http://localhost:9105/notes/list
  method: POST
- tool_name: notes_get_document
  url: http://localhost:9105/notes/get
  method: POST
environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
  - fixtures/helpdesk/tickets.json
  - fixtures/notes/documents.json
scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  1. List tickets: TK-1901 (nginx log file over 50GB), TK-1902 (application log not rotating), TK-1903 (journal logs consuming disk)
  2. Review docs: note_1901 (log rotation config docs) and note_1902 (disk usage monitoring)
  3. Analysis:
     - TK-1901: nginx access.log at 52GB, logrotate config has syntax error causing rotation failure
     - TK-1902: app log uses custom path not covered by logrotate, needs new rotation config
     - TK-1903: systemd journal has no size limit configured, accumulated 30GB
  4. Remediation: fix logrotate syntax, add app log rotation config, set journal size limit (SystemMaxUse=2G)

primary_dimensions:
- completion
