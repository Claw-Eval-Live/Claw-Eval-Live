task_id: CTB_WORKFLOW_08_campaign_launch_sequence
task_name: Campaign Launch Sequence
version: "1.0"
category: workflow
difficulty: hard

services:
  - name: gmail
    command: python mock_services/gmail/server.py
    port: 9100
    health_check: http://localhost:9100/gmail/messages
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9100/gmail/reset
    env:
      GMAIL_FIXTURES: tasks/CTB_WORKFLOW_08_campaign_launch_sequence/fixtures/gmail/inbox.json
      ERROR_RATE: "0"
  - name: crm
    command: python mock_services/crm/server.py
    port: 9110
    health_check: http://localhost:9110/crm/customers
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9110/crm/reset
    env:
      CRM_FIXTURES: tasks/CTB_WORKFLOW_08_campaign_launch_sequence/fixtures/crm/customers.json
      ERROR_RATE: "0"
  - name: calendar
    command: python mock_services/calendar/server.py
    port: 9101
    health_check: http://localhost:9101/calendar/events
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9101/calendar/reset
    env:
      CALENDAR_FIXTURES: tasks/CTB_WORKFLOW_08_campaign_launch_sequence/fixtures/calendar/events.json
      ERROR_RATE: "0"
  - name: todo
    command: python mock_services/todo/server.py
    port: 9104
    health_check: http://localhost:9104/todo/tasks
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9104/todo/reset
    env:
      TODO_FIXTURES: tasks/CTB_WORKFLOW_08_campaign_launch_sequence/fixtures/todo/tasks.json
      ERROR_RATE: "0"

prompt:
  text: |
    As a marketing operations manager, please coordinate the launch of a new marketing campaign. Please:
    
    1. Review emails for campaign brief, creative assets status, and stakeholder approvals
    2. Check the CRM for the target audience segment and contact list
    3. Create to-do items for each launch step: content review, channel setup, A/B test, go-live
    4. Schedule campaign review meetings and launch date on the calendar
    5. Output a campaign launch plan with timeline, task owners, and status for each step

  language: en

tools:
  - name: gmail_list_messages
    description: List email messages
    input_schema:
      type: object
      properties:
        days_back:
          type: integer
          default: 7
      required: []
  - name: gmail_get_message
    description: Get email message details
    input_schema:
      type: object
      properties:
        message_id:
          type: string
      required: [message_id]
  - name: crm_list_customers
    description: List CRM customers
    input_schema:
      type: object
      properties:
        status:
          type: string
      required: []
  - name: calendar_list_events
    description: List calendar events
    input_schema:
      type: object
      properties:
        start_date:
          type: string
      required: []
  - name: todo_list_tasks
    description: List to-do tasks
    input_schema:
      type: object
      properties:
        status:
          type: string
      required: []
  - name: todo_create_task
    description: Create a to-do task
    input_schema:
      type: object
      properties:
        title:
          type: string
        due_date:
          type: string
        priority:
          type: string
      required: [title]

tool_endpoints:
  - tool_name: gmail_list_messages
    url: http://localhost:9100/gmail/messages
    method: POST
  - tool_name: gmail_get_message
    url: http://localhost:9100/gmail/messages/get
    method: POST
  - tool_name: crm_list_customers
    url: http://localhost:9110/crm/customers
    method: POST
  - tool_name: calendar_list_events
    url: http://localhost:9101/calendar/events
    method: POST
  - tool_name: todo_list_tasks
    url: http://localhost:9104/todo/tasks
    method: POST
  - tool_name: todo_create_task
    url: http://localhost:9104/todo/tasks/create
    method: POST

environment:
  timeout_seconds: 300
  max_turns: 30
  fixtures:
    - fixtures/gmail/inbox.json
    - fixtures/crm/customers.json
    - fixtures/calendar/events.json
    - fixtures/todo/tasks.json

scoring_components: []
safety_checks: []
expected_actions:
  - service: todo
    action_key: tasks
    required: true

reference_solution: |
  1. Read campaign brief email (Spring Promo, target: existing customers, launch April 15)
  2. Pull target segment from CRM (2,500 contacts, enterprise tier)
  3. Create to-dos: creative approval, email template setup, landing page, A/B test, analytics tracking
  4. Schedule review meeting April 10, launch date April 15
  5. Report: 6-step launch plan with owners and status

primary_dimensions: [completion]
