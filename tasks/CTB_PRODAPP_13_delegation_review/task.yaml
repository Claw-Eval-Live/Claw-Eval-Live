task_id: CTB_PRODAPP_13_delegation_review
task_name: CTB_PRODAPP_13_delegation_review
version: '1.0'
category: workflow
difficulty: medium
services:
- name: todo
  command: python mock_services/todo/server.py
  port: 9104
  health_check: http://localhost:9104/todo/tasks
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9104/todo/reset
  env:
    ERROR_RATE: '0'
    TODO_FIXTURES: tasks/CTB_PRODAPP_13_delegation_review/fixtures/todo/tasks.json
- name: calendar
  command: python mock_services/calendar/server.py
  port: 9101
  health_check: http://localhost:9101/calendar/events
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9101/calendar/reset
  env:
    ERROR_RATE: '0'
    CALENDAR_FIXTURES: tasks/CTB_PRODAPP_13_delegation_review/fixtures/calendar/events.json
    CALENDAR_DISABLE_DATE_SHIFT: '1'
prompt:
  text: |
    Please review the current task delegation across the team. Based on each member's assigned tasks in the to-do list and their meeting commitments in the calendar, assess whether task assignments are appropriate. Output: delegation review per member, misaligned assignments, and reallocation recommendations.
  language: en
tools:
- name: todo_list_tasks
  description: Retrieve the to-do task list
  input_schema:
    type: object
    properties:
      status:
        type: string
        description: Filter by status
        default: all
    required: []
- name: todo_update_task
  description: Description
  input_schema:
    type: object
    properties:
      task_id:
        type: string
      status:
        type: string
      priority:
        type: string
    required:
    - task_id
- name: calendar_list_events
  description: Priority level
  input_schema:
    type: object
    properties:
      date:
        type: string
        description: Start date (YYYY-MM-DD)
      days:
        type: integer
        description: Number of days to view
        default: 1
    required:
    - date
- name: calendar_get_event
  description: Description
  input_schema:
    type: object
    properties:
      event_id:
        type: string
        description: Event ID
    required:
    - event_id
tool_endpoints:
- tool_name: todo_list_tasks
  url: http://localhost:9104/todo/tasks
  method: POST
- tool_name: todo_update_task
  url: http://localhost:9104/todo/tasks/update
  method: POST
- tool_name: calendar_list_events
  url: http://localhost:9101/calendar/events
  method: POST
- tool_name: calendar_get_event
  url: http://localhost:9101/calendar/events/get
  method: POST
environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
  - fixtures/todo/tasks.json
  - fixtures/calendar/events.json
scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  1. Lin Feng is overloaded: ~32h of assigned tasks
  2. Lin Feng has all-day meetings on 4/4, worsening the capacity issue
  3. API documentation task is medium priority and transferable
  4. Delegation target: Yang Fan (~10h assigned, has capacity) or He Yu (~5h assigned, lightest load)
  5. He Yu is the best delegation target (lightest workload)
  6. Capacity comparison: Lin Feng ~32h vs Yang Fan ~10h vs He Yu ~5h
primary_dimensions:
- completion
