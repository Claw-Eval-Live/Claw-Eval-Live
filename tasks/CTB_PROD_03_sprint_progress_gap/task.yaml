task_id: CTB_PROD_03_sprint_progress_gap
task_name: Sprint Progress Gap Analysis
version: "1.0"
category: workflow
difficulty: medium

services:
  - name: notes
    command: python mock_services/notes/server.py
    port: 9105
    health_check: http://localhost:9105/notes/list
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9105/notes/reset
    env:
      NOTES_FIXTURES: tasks/CTB_PROD_03_sprint_progress_gap/fixtures/notes/notes.json
      ERROR_RATE: "0"
  - name: todo
    command: python mock_services/todo/server.py
    port: 9104
    health_check: http://localhost:9104/todo/tasks
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9104/todo/reset
    env:
      TODO_FIXTURES: tasks/CTB_PROD_03_sprint_progress_gap/fixtures/todo/tasks.json
      ERROR_RATE: "0"

prompt:
  text: |
    Sprint 12 ends tomorrow (deadline 3/28). You need to produce a sprint progress gap analysis.

    Steps:
    1. Read the Sprint 12 planning notes (what tasks were committed, how many story points)
    2. Get the current status of all Sprint 12 tasks from the task management tool
    3. Compare planned vs. actual and calculate:
       - Completion rate (completed story points / total committed story points)
       - Completion status per team member
       - Which tasks are at risk (in_progress, blocked, or pending)
    4. Identify issues:
       - Were there any unplanned tasks inserted into the sprint that impacted progress?
       - Are there blocked tasks that need to be unblocked?
       - Are any team members overloaded?
    5. Output a sprint progress report containing:
       - Sprint overview (total story points, count of done/in-progress/not-started/blocked)
       - Per-member analysis
       - Risk list and recommendations
  language: en

tools:
  - name: notes_list
    description: Get the list of notes
    input_schema:
      type: object
      properties:
        search:
          type: string
      required: []
  - name: notes_get
    description: Get note details
    input_schema:
      type: object
      properties:
        note_id:
          type: string
      required: [note_id]
  - name: todo_list_tasks
    description: Get the list of tasks
    input_schema:
      type: object
      properties:
        status:
          type: string
        tag:
          type: string
      required: []

tool_endpoints:
  - tool_name: notes_list
    url: http://localhost:9105/notes/list
    method: POST
  - tool_name: notes_get
    url: http://localhost:9105/notes/get
    method: POST
  - tool_name: todo_list_tasks
    url: http://localhost:9104/todo/tasks
    method: POST

environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
    - fixtures/notes/notes.json
    - fixtures/todo/tasks.json

scoring_components: []
safety_checks: []
expected_actions: []

reference_solution: |
  Sprint overview: 18 pts committed, 8 pts completed (44%), 5 pts in-progress, 2 pts not started, 3 pts blocked
  Completed: SP12-001(3), SP12-003(3), SP12-005(2)
  At risk: SP12-002(5pts, in_progress), SP12-004(pending), SP12-006(blocked)
  Unplanned insertion: BUG-101 consumed Zhang's time
  Zhang's workload: committed 10pts (heaviest), plus bug insertion

primary_dimensions: [completion]
