task_id: CTB_SHELL_24_storage_tiering_review
task_name: Storage Tiering Review
version: '1.0'
category: workflow
difficulty: hard
services:
- name: helpdesk
  command: python mock_services/helpdesk/server.py
  port: 9107
  health_check: http://localhost:9107/helpdesk/tickets
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9107/helpdesk/reset
  env:
    HELPDESK_FIXTURES: tasks/CTB_SHELL_24_storage_tiering_review/fixtures/helpdesk/tickets.json
    ERROR_RATE: '0'
- name: notes
  command: python mock_services/notes/server.py
  port: 9105
  health_check: http://localhost:9105/notes/list
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9105/notes/reset
  env:
    NOTES_FIXTURES: tasks/CTB_SHELL_24_storage_tiering_review/fixtures/notes/documents.json
    ERROR_RATE: '0'
prompt:
  text: |
    Storage costs have been rising and the team wants to optimize the storage tier strategy. Please:
    
    1. Review all tickets to find alerts about storage capacity and performance issues
    2. Review the storage architecture documentation and data lifecycle management notes
    3. Analyze the current storage allocation and identify optimization opportunities
    4. Generate a review report including: storage tier, current usage, data characteristics, cost per GB, access frequency, and tiering optimization recommendations

  language: en
tools:
- name: helpdesk_list_tickets
  description: List tickets
  input_schema:
    type: object
    properties:
      status:
        type: string
    required: []
- name: helpdesk_get_ticket
  description: Get ticket details
  input_schema:
    type: object
    properties:
      ticket_id:
        type: string
    required:
    - ticket_id
- name: notes_list_documents
  description: List documents
  input_schema:
    type: object
    properties: {}
    required: []
- name: notes_get_document
  description: Get document details
  input_schema:
    type: object
    properties:
      note_id:
        type: string
    required:
    - note_id
tool_endpoints:
- tool_name: helpdesk_list_tickets
  url: http://localhost:9107/helpdesk/tickets
  method: POST
- tool_name: helpdesk_get_ticket
  url: http://localhost:9107/helpdesk/tickets/get
  method: POST
- tool_name: notes_list_documents
  url: http://localhost:9105/notes/list
  method: POST
- tool_name: notes_get_document
  url: http://localhost:9105/notes/get
  method: POST
environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
  - fixtures/helpdesk/tickets.json
  - fixtures/notes/documents.json
scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  1. List tickets: TK-2401 (SSD high-perf tier 90% full), TK-2402 (HDD tier has 60% cold data), TK-2403 (object storage underutilized)
  2. Review docs: note_2401 (storage architecture docs) and note_2402 (data lifecycle policy)
  3. Analysis:
     - SSD tier: 8TB/9TB used, 3TB of data accessed <1 time per month, should move to HDD
     - HDD tier: 12TB/20TB used, 7TB of data older than 1 year, should archive to object storage
     - Object storage: only 2TB/50TB used, cost is 1/5 of HDD
  4. Remediation: migrate cold data from SSD to HDD (save 3TB), archive old data to object storage (save 7TB), implement automated tiering policy

primary_dimensions:
- completion
