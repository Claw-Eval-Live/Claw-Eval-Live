task_id: CTB_SUPPORT_02_customer_complaint_trend
task_name: Customer Complaint Trend Analysis
version: "1.0"
category: workflow
difficulty: medium-hard

services:
  - name: gmail
    command: python mock_services/gmail/server.py
    port: 9100
    health_check: http://localhost:9100/gmail/messages
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9100/gmail/reset
    env:
      GMAIL_FIXTURES: tasks/CTB_SUPPORT_02_customer_complaint_trend/fixtures/gmail/inbox.json
      ERROR_RATE: "0"
  - name: helpdesk
    command: python mock_services/helpdesk/server.py
    port: 9107
    health_check: http://localhost:9107/helpdesk/tickets
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9107/helpdesk/reset
    env:
      HELPDESK_FIXTURES: tasks/CTB_SUPPORT_02_customer_complaint_trend/fixtures/helpdesk/tickets.json
      ERROR_RATE: "0"

prompt:
  text: |
    Please analyze this month's customer complaint trends by combining email complaints and ticket data.

    Specific requirements:
    1. Review all customer complaint emails
    2. Review all related tickets
    3. Classify complaints by category (e.g., performance issues, billing issues, feature defects, etc.)
    4. Count the number of complaints per category (merge emails and tickets, deduplicate)
    5. Analyze complaint trends: which category has the most complaints and whether it is increasing
    6. Identify high-risk customers (those who have explicitly expressed dissatisfaction or threatened to churn)
    7. Provide priority handling recommendations

    Please produce a complete customer complaint trend analysis report.
  language: en

tools:
  - name: gmail_list_messages
    description: List email messages
    input_schema:
      type: object
      properties:
        days_back:
          type: integer
          default: 30
        max_results:
          type: integer
          default: 20
      required: []

  - name: gmail_get_message
    description: Get email message details
    input_schema:
      type: object
      properties:
        message_id:
          type: string
      required: [message_id]

  - name: helpdesk_list_tickets
    description: List tickets
    input_schema:
      type: object
      properties:
        status:
          type: string
        category:
          type: string
      required: []

  - name: helpdesk_get_ticket
    description: Get ticket details
    input_schema:
      type: object
      properties:
        ticket_id:
          type: string
      required: [ticket_id]

tool_endpoints:
  - tool_name: gmail_list_messages
    url: http://localhost:9100/gmail/messages
    method: POST
  - tool_name: gmail_get_message
    url: http://localhost:9100/gmail/messages/get
    method: POST
  - tool_name: helpdesk_list_tickets
    url: http://localhost:9107/helpdesk/tickets
    method: POST
  - tool_name: helpdesk_get_ticket
    url: http://localhost:9107/helpdesk/tickets/get
    method: POST

environment:
  timeout_seconds: 300
  max_turns: 24
  fixtures:
    - fixtures/gmail/inbox.json
    - fixtures/helpdesk/tickets.json

scoring_components: []
safety_checks: []
reference_solution: |
  1. Performance issues: 2 unique complaints (zhao/clientA, qian/clientB) -- most common category, highest urgency
  2. Billing issues: 1 complaint (sun/clientC)
  3. Feature/export defects: 2 complaints (li/clientD feature request, wu/clientE export bug)
  4. Total unique complaints: 5 (after deduplication across email and ticket channels)
  5. High-risk customer: qian@clientB -- explicitly threatened to switch vendors; requires immediate executive outreach
  6. Trend: performance issues are most frequent; cross-channel deduplication needed to avoid double-counting
  7. Priority: address performance issues first (highest count + churn risk); immediate outreach to clientB; preventive measures for all categories
primary_dimensions: [completion]
