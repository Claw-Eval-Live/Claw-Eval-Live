task_id: CTB_PRODAPP_06_action_item_extraction
task_name: CTB_PRODAPP_06_action_item_extraction
version: '1.0'
category: workflow
difficulty: medium
services:
- name: calendar
  command: python mock_services/calendar/server.py
  port: 9101
  health_check: http://localhost:9101/calendar/events
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9101/calendar/reset
  env:
    ERROR_RATE: '0'
    CALENDAR_FIXTURES: tasks/CTB_PRODAPP_06_action_item_extraction/fixtures/calendar/events.json
    CALENDAR_DISABLE_DATE_SHIFT: '1'
- name: todo
  command: python mock_services/todo/server.py
  port: 9104
  health_check: http://localhost:9104/todo/tasks
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9104/todo/reset
  env:
    ERROR_RATE: '0'
    TODO_FIXTURES: tasks/CTB_PRODAPP_06_action_item_extraction/fixtures/todo/tasks.json
- name: notes
  command: python mock_services/notes/server.py
  port: 9105
  health_check: http://localhost:9105/notes/list
  health_check_method: POST
  ready_timeout: 10
  reset_endpoint: http://localhost:9105/notes/reset
  env:
    ERROR_RATE: '0'
    NOTES_FIXTURES: tasks/CTB_PRODAPP_06_action_item_extraction/fixtures/notes/meetings.json
prompt:
  text: |
    Please extract all action items from meeting notes. Cross-reference with the calendar to confirm related meeting information, then compare extracted action items against the existing to-do task list to identify items not yet entered into the to-do system. Output: all extracted action items, mapping to existing tasks, items missing from the to-do system, and recommendations for adding them.
  language: en
tools:
- name: calendar_list_events
  description: Retrieve calendar events within a specified date range
  input_schema:
    type: object
    properties:
      date:
        type: string
        description: Start date (YYYY-MM-DD)
      days:
        type: integer
        description: Number of days to view
        default: 1
    required:
    - date
- name: calendar_get_event
  description: Description
  input_schema:
    type: object
    properties:
      event_id:
        type: string
        description: Event ID
    required:
    - event_id
- name: todo_list_tasks
  description: Description
  input_schema:
    type: object
    properties:
      status:
        type: string
        description: Filter by status
        default: all
    required: []
- name: todo_update_task
  description: Description
  input_schema:
    type: object
    properties:
      task_id:
        type: string
      status:
        type: string
      priority:
        type: string
    required:
    - task_id
- name: notes_list
  description: Priority level
  input_schema:
    type: object
    properties:
      max_results:
        type: integer
        description: Maximum number of results to return
        default: 10
    required: []
- name: notes_get
  description: Description
  input_schema:
    type: object
    properties:
      note_id:
        type: string
        description: Note ID
    required:
    - note_id
tool_endpoints:
- tool_name: calendar_list_events
  url: http://localhost:9101/calendar/events
  method: POST
- tool_name: calendar_get_event
  url: http://localhost:9101/calendar/events/get
  method: POST
- tool_name: todo_list_tasks
  url: http://localhost:9104/todo/tasks
  method: POST
- tool_name: todo_update_task
  url: http://localhost:9104/todo/tasks/update
  method: POST
- tool_name: notes_list
  url: http://localhost:9105/notes/list
  method: POST
- tool_name: notes_get
  url: http://localhost:9105/notes/get
  method: POST
environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
  - fixtures/calendar/events.json
  - fixtures/todo/tasks.json
  - fixtures/notes/meetings.json
scoring_components: []
safety_checks: []
expected_actions: []
reference_solution: |
  1. Sprint 12 meeting items (5): login module optimization, gateway upgrade, read-write split plan, E2E test framework, product roadmap
  2. Architecture review items (3): API gateway rate-limit POC, DB sharding design, stress test environment
  3. Already tracked in todo: login module optimization (Li Na), microservice gateway upgrade (Wang Qiang)
  4. Missing from todo (need creation): read-write split plan (Zhao Min), E2E test framework (Chen Lei), product roadmap (Zhang Wei)
  5. Missing from todo: API gateway rate-limit POC (Wang Qiang), DB sharding design (Zhao Min), stress test environment (Chen Lei)
  6. Each missing item should have assignee, priority, and due date recommendation
primary_dimensions:
- completion
