task_id: CTB_SEC_01_suspicious_login_alert
task_name: Suspicious Login Alert Analysis
version: "1.0"
category: security
difficulty: medium

services:
  - name: gmail
    command: python mock_services/gmail/server.py
    port: 9100
    health_check: http://localhost:9100/gmail/messages
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9100/gmail/reset
    env:
      GMAIL_FIXTURES: tasks/CTB_SEC_01_suspicious_login_alert/fixtures/gmail/inbox.json
      ERROR_RATE: "0"

prompt:
  text: |
    You are a Security Operations Center (SOC) analyst. Multiple security alert emails have been received. Please:

    1. Review all security alert emails
    2. For each alert, perform analysis:
       - Determine whether it is a real security threat or a false positive
       - Analyze the attack source: IP address, geographic location, timestamp
       - Check for correlated attacks (same IP targeting multiple accounts)
    3. Identify all compromised accounts
    4. Produce a security analysis report including:
       - List of affected accounts with severity and risk level
       - Attack profile with IP correlation analysis
       - Per-alert recommended actions (reset password, block IP, dismiss alert, etc.)
       - Data breach risk assessment (whether sensitive data was accessed)
  language: en

tools:
  - name: gmail_list_messages
    description: Get the list of emails
    input_schema:
      type: object
      properties:
        days_back:
          type: integer
          default: 7
        max_results:
          type: integer
          default: 20
      required: []

  - name: gmail_get_message
    description: Get email details by message ID
    input_schema:
      type: object
      properties:
        message_id:
          type: string
      required: [message_id]

tool_endpoints:
  - tool_name: gmail_list_messages
    url: http://localhost:9100/gmail/messages
    method: POST
  - tool_name: gmail_get_message
    url: http://localhost:9100/gmail/messages/get
    method: POST

environment:
  timeout_seconds: 300
  max_turns: 20
  fixtures:
    - fixtures/gmail/inbox.json

scoring_components: []
expected_actions: []
reference_solution: |
  1. wang.lei: COMPROMISED -- attacker IP 185.220.101.34 (Russia); VPN data exfiltration of 2.3GB; accessed repos: core-payment-service, user-auth-module, api-gateway
  2. zhang.min: COMPROMISED -- same attacker IP 185.220.101.34 as wang.lei; coordinated attack
  3. li.na: BRUTE FORCE ATTACK -- 17 failed login attempts from Ukraine; account locked
  4. chen.wei: FALSE POSITIVE -- Hong Kong login matches travel schedule; dismiss alert
  5. IP correlation: 185.220.101.34 used for both wang.lei and zhang.min indicates coordinated attack
  6. Data breach: 2.3GB exfiltrated via wang.lei's compromised VPN session; 3 code repositories potentially exposed
  7. Remediation: reset passwords for wang.lei and zhang.min; block IP 185.220.101.34; enforce MFA for all accounts
  8. Remediation: revoke wang.lei's VPN access; conduct security audit on 3 exposed repositories
  9. Monitor li.na account after lockout period
primary_dimensions: [completion]
