function ac(i){return CL[i%CL.length]}
function hc(v){return v<.4?'h0':v<.6?'h1':v<D.threshold?'h2':'h3'}
function sw(id){document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.textContent.toLowerCase().startsWith(id.substring(0,2).replace('lb','le').replace('hm','ta').replace('ct','ca').replace('rm','re'))));document.querySelectorAll('.pan').forEach(p=>p.classList.toggle('on',p.id===id))}

function rS(){const t=D.leaderboard[0];document.getElementById('sr').innerHTML=`
<div class="card"><div class="l">Tasks</div><div class="v">${D.n_tasks}</div></div>

<div class="card"><div class="l">#1</div><div class="v" style="font-size:15px">${t.name}</div></div>
<div class="card"><div class="l">#1 Pass Rate</div><div class="v">${(t.rate*100).toFixed(1)}%</div></div>`}

function rL(){let h='<table><thead><tr><th style="width:32px">#</th><th>Model</th><th class="n">Pass</th><th class="n">Rate</th><th class="n">Avg</th><th class="bc">Score</th></tr></thead><tbody>';
D.leaderboard.forEach((m,i)=>{const r=i+1,rc=r<=3?`r${r}`:'',pct=(m.rate*100).toFixed(1),avg=(m.avg*100).toFixed(1),bw=Math.round(m.avg*100),bc=CL[i%CL.length];
h+=`<tr><td class="rk ${rc}">${r}</td><td><div class="mc"><div class="av" style="background:${ac(i)}">${m.name[0]}</div><div><div class="mn">${m.name}</div><div class="mo">${m.org}</div></div></div></td><td class="n" style="font-weight:600">${m.pass} / ${m.total}</td><td class="n">${pct}%</td><td class="n">${avg}</td><td class="bc"><div class="bb"><div class="bf" style="width:${bw}%;background:${bc}"></div></div></td></tr>`});
h+='</tbody></table>';document.getElementById('lb').innerHTML=h}

function rH(){const mo=D.leaderboard.map(m=>m.key);const ts=[...D.tasks].sort((a,b)=>a.category.localeCompare(b.category)||a.task_id.localeCompare(b.task_id));
let h='<div class="fr"><label>Category:</label><select id="cf" onchange="fH()"><option value="ALL">All</option>';
[...new Set(ts.map(t=>t.category))].sort().forEach(c=>h+=`<option value="${c}">${c} (${ts.filter(t=>t.category===c).length})</option>`);
h+='</select></div><div class="hm"><table><thead><tr><th class="tn">Task</th>';
mo.forEach(m=>{const s=D.model_names[m].replace('Claude ','').replace('Gemini ','G').replace('Qwen ','Q').replace(' Pro','P').replace('DeepSeek','DS');h+=`<th>${s}</th>`});
h+='</tr></thead><tbody id="hb">';
ts.forEach(t=>{h+=`<tr class="hr" data-c="${t.category}"><td class="tn" title="${t.task_id}">${t.task_id.replace('CTB_','')}</td>`;
mo.forEach(m=>{const v=t[m]||0;h+=`<td class="${hc(v)}">${v.toFixed(2)}</td>`});h+='</tr>'});
h+='</tbody></table></div>';document.getElementById('hm').innerHTML=h}

function fH(){const c=document.getElementById('cf').value;document.querySelectorAll('.hr').forEach(r=>{r.style.display=(c==='ALL'||r.dataset.c===c)?'':'none'})}

function rC(){const cs=D.categories;const s=Object.entries(cs).sort((a,b)=>b[1]-a[1]);const mx=s[0][1];
let h='<div style="margin-top:18px">';s.forEach(([c,n])=>{const w=Math.round(n/mx*100);h+=`<div class="cb"><span class="cl">${c}</span><div class="cf" style="width:${w}%">${n}</div></div>`});h+='</div>';
const mo=D.leaderboard.slice(0,6).map(m=>m.key);
h+='<div class="sep"></div><h3 style="font-size:15px">Top-6 Avg by Category</h3><div class="hm"><table><thead><tr><th>Cat</th><th>N</th>';
mo.forEach(m=>h+=`<th>${D.model_names[m].split(' ').pop()}</th>`);h+='</tr></thead><tbody>';
s.forEach(([c,n])=>{const ct=D.tasks.filter(t=>t.category===c);h+=`<tr><td style="font-weight:600">${c}</td><td class="n">${n}</td>`;
mo.forEach(m=>{const a=ct.reduce((s,t)=>s+(t[m]||0),0)/ct.length;h+=`<td class="${hc(a)}">${(a*100).toFixed(0)}</td>`});h+='</tr>'});
h+='</tbody></table></div>';document.getElementById('ct').innerHTML=h}

function rR(){const mo=D.leaderboard.slice(0,5).map(m=>m.key);
let h='<p style="margin-top:14px;color:var(--t2);font-size:13px">52 tasks removed for ordering optimization, low discrimination, or extreme model anomalies.</p>';
h+='<div class="hm"><table><thead><tr><th class="tn">Task</th><th>Cat</th>';
mo.forEach(m=>{h+=`<th>${D.model_names[m].split(' ').pop()}</th>`});h+='<th>Tag</th></tr></thead><tbody>';
D.removed.forEach(t=>{const sc=mo.map(m=>t[m]||0);const avg=sc.reduce((a,b)=>a+b,0)/sc.length;const std=Math.sqrt(sc.reduce((s,v)=>s+(v-avg)**2,0)/sc.length);
const mn=Math.min(...sc);let tag='Optimization';if(std<.05)tag='Low discrim.';else if(mn<.12)tag='Anomaly';
h+=`<tr><td class="tn" title="${t.task_id}">${t.task_id.replace('CTB_','')}</td><td>${t.category}</td>`;
mo.forEach(m=>{const v=t[m]||0;h+=`<td class="${hc(v)}">${v.toFixed(2)}</td>`});
h+=`<td><span class="rt">${tag}</span></td></tr>`});
h+='</tbody></table></div>';document.getElementById('rm').innerHTML=h}

rS();rL();rH();rC();rR();
