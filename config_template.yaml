# LiveClaw-500 Model Configuration Template
#
# Copy this file and fill in your API credentials:
#   cp config_template.yaml model_configs/my_model.yaml
#
# Environment variables are resolved at runtime:
#   export MY_API_KEY=sk-...

model:
  api_key: ${MY_API_KEY}
  base_url: https://openrouter.ai/api/v1    # or your provider's OpenAI-compatible endpoint
  model_id: anthropic/claude-opus-4.6        # model identifier at your provider

judge:
  api_key: ${MY_API_KEY}                     # can be a different key/provider
  base_url: https://openrouter.ai/api/v1
  model_id: google/gemini-3-flash-preview    # recommended judge model
  enabled: true

defaults:
  trace_dir: traces_my_model
  tasks_dir: tasks
